<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17191d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Fonte">
<link rel="apple-touch-icon" href="fonte-icon.png">
<title>La Fonte — PPL ×2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#17191d; --card:#1f2227; --card2:#262a31; --line:#30343c; --line2:#3a3f48;
  --ink:#ece9e1; --mut:#9a9ea6; --dim:#6c7078;
  --blu:#4a7df0; --blu-soft:rgba(74,125,240,.14); --blu-line:rgba(74,125,240,.45);
  --grn:#43a066; --amber:#d9a441; --red:#d96a5a;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:'Barlow',system-ui,sans-serif; font-size:16px; line-height:1.45;
  padding-bottom:110px;
}
.wrap{max-width:520px; margin:0 auto; padding:0 14px}

/* ---------- Header ---------- */
header.top{position:sticky; top:0; z-index:50; background:linear-gradient(var(--bg) 82%, rgba(23,25,29,0)); padding-top:env(safe-area-inset-top)}
.brandrow{display:flex; align-items:center; justify-content:space-between; padding:14px 2px 8px}
.brand .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase}
.brand h1{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:30px; letter-spacing:.02em; margin:0; line-height:1; text-transform:uppercase}
.brand h1 span{color:var(--blu)}
.docbtn{
  border:1px solid var(--line2); background:var(--card); color:var(--ink);
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:15px; letter-spacing:.05em;
  padding:9px 14px; border-radius:999px; cursor:pointer; text-transform:uppercase;
}
.docbtn:active{transform:scale(.97)}
.chips{display:flex; gap:6px; overflow-x:auto; padding:4px 2px 12px; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto; min-width:64px; text-align:center; cursor:pointer;
  border:1px solid var(--line); border-radius:12px; padding:7px 12px 6px; background:var(--card);
}
.chip .d{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.04em; text-transform:uppercase}
.chip .t{font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:.06em; text-transform:uppercase}
.chip.sel{border-color:var(--blu-line); background:var(--blu-soft)}
.chip.sel .t{color:var(--blu)}

/* ---------- Banner ---------- */
.banner{
  display:flex; gap:10px; align-items:flex-start;
  border:1px solid rgba(217,164,65,.4); background:rgba(217,164,65,.08);
  border-radius:var(--r); padding:12px 14px; margin:2px 0 14px; font-size:14px; color:#e8d9b8;
}
.banner b{color:var(--amber)}
.banner button{margin-left:auto; background:none; border:none; color:var(--amber); font-size:16px; cursor:pointer; padding:0 2px}

/* ---------- Day header ---------- */
.dayhead{margin:6px 0 14px}
.dayhead h2{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:44px; line-height:.95; margin:0; text-transform:uppercase}
.dayhead .sub{color:var(--mut); font-size:14px; margin-top:6px}
.dayhead .meta{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); margin-top:8px; letter-spacing:.04em; text-transform:uppercase}
.logistics{
  border-left:3px solid var(--blu); background:var(--card); border-radius:0 var(--r) var(--r) 0;
  padding:10px 12px; font-size:13.5px; color:var(--mut); margin:0 0 16px;
}
.logistics b{color:var(--ink); font-weight:600}

/* ---------- Cards ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:12px; position:relative}
.card.warm{border-style:dashed}
.card h3{
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:21px; letter-spacing:.02em;
  margin:0; text-transform:uppercase; display:flex; align-items:baseline; gap:8px; padding-right:84px;
}
.card h3 .num{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--blu); font-weight:600}
.lk{font-size:13px; opacity:.55}
.exmeta{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mut); margin:5px 0 0; letter-spacing:.03em}
.cue{font-size:13.5px; color:var(--mut); margin:8px 0 0; line-height:1.45}
.last{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--dim); margin-top:9px; letter-spacing:.02em}
.badge{
  display:inline-flex; align-items:center; gap:6px; margin-top:9px;
  background:var(--blu-soft); border:1px solid var(--blu-line); color:#9db9f7;
  font-size:12.5px; font-weight:600; border-radius:8px; padding:5px 9px;
}
.pencil{
  position:absolute; top:10px; right:50px; width:34px; height:34px;
  border-radius:9px; border:1px solid var(--line); background:var(--card2);
  color:var(--dim); font-size:14px; cursor:pointer;
}
.fold{
  position:absolute; top:10px; right:10px; width:34px; height:34px;
  border-radius:9px; border:1px solid var(--line); background:var(--card2);
  color:var(--dim); font-size:13px; cursor:pointer;
}
.hdrin{
  flex:1; min-width:0; background:var(--bg); border:1px solid var(--blu-line); border-radius:8px;
  color:var(--ink); font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:20px;
  letter-spacing:.02em; text-transform:uppercase; padding:4px 8px; outline:none;
}
.cuein{
  width:100%; margin-top:9px; background:var(--bg); border:1px dashed var(--blu-line); border-radius:8px;
  color:var(--mut); font-family:'Barlow',sans-serif; font-size:13.5px; line-height:1.45; padding:8px 9px;
  outline:none; resize:vertical;
}
.warmlist{list-style:none; margin:10px 0 0; padding:0}
.warmlist li{display:flex; gap:9px; padding:6px 0; font-size:14px; color:var(--mut); align-items:flex-start}
.warmlist li::before{content:""; flex:0 0 auto; width:7px; height:7px; border-radius:50%; border:1.5px solid var(--dim); margin-top:6px}

/* ---------- Set rows ---------- */
.sets{margin-top:12px; display:flex; flex-direction:column; gap:7px}
.setrow{
  display:grid; grid-template-columns:26px 1fr 1fr 46px; gap:8px; align-items:center;
  background:var(--card2); border:1px solid var(--line); border-radius:11px; padding:7px 8px;
}
.setrow .sn{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); text-align:center}
.setrow input{
  width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px;
  color:var(--ink); font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600;
  padding:8px 6px; text-align:center; outline:none;
}
.setrow input:focus-visible{border-color:var(--blu-line)}
.setrow input::placeholder{color:var(--dim); font-weight:500}
.ck{
  width:44px; height:38px; border-radius:9px; border:1.5px solid var(--line2);
  background:transparent; color:var(--dim); font-size:17px; cursor:pointer; line-height:1;
}
.setrow.done{background:var(--blu-soft); border-color:var(--blu-line)}
.setrow.done .ck{background:var(--blu); border-color:var(--blu); color:#fff}
.unit{font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; text-align:center; margin-top:3px}

/* ---------- Éditeur ---------- */
.editp{margin-top:12px; border-top:1px dashed var(--line2); padding-top:12px; display:flex; flex-direction:column; gap:10px}
.editp label{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; display:flex; flex-direction:column; gap:5px}
.editp input[type=text], .editp textarea{
  background:var(--bg); border:1px solid var(--line); border-radius:9px; color:var(--ink);
  font-family:'Barlow',sans-serif; font-size:15px; padding:9px 10px; outline:none; width:100%; resize:vertical;
}
.segs{display:flex; gap:6px; flex-wrap:wrap}
.seg{flex:1 0 auto; border:1px solid var(--line); background:var(--card2); color:var(--mut);
  border-radius:9px; padding:8px 10px; font-size:13px; cursor:pointer; text-align:center}
.seg.on{border-color:var(--blu-line); background:var(--blu-soft); color:#9db9f7; font-weight:600}
.steprow{display:flex; gap:14px; flex-wrap:wrap}
.stepper{display:flex; align-items:center; gap:8px}
.stepper .sb{width:36px; height:36px; border-radius:9px; border:1px solid var(--line2); background:var(--card2); color:var(--ink); font-size:17px; cursor:pointer}
.stepper .sv{font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600; min-width:52px; text-align:center}
.stepper .sl{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase}
.repin{width:64px; background:var(--bg); border:1px solid var(--line); border-radius:9px; color:var(--ink);
  font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600; padding:8px 6px; text-align:center; outline:none}
.editactions{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:2px}
.ebtn{border:1px solid var(--line2); background:var(--card2); color:var(--ink); border-radius:10px;
  padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer}
.ebtn.primary{background:var(--blu); border-color:var(--blu); color:#fff}
.ebtn.danger{color:var(--red); border-color:rgba(217,106,90,.4)}
.ebtn.ghost{color:var(--dim)}
.linksec{margin-top:2px; border-top:1px dashed var(--line2); padding-top:10px; display:flex; flex-direction:column; gap:8px}
.lkstatus{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); letter-spacing:.03em; line-height:1.5}
.lkstatus b{color:var(--mut)}
.lkrow{display:block; width:100%; text-align:left; border:1px solid var(--line); background:var(--card2); color:var(--ink);
  border-radius:9px; padding:10px 12px; font-size:14px; cursor:pointer}
.lkrow small{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin-right:8px}
.addex{
  width:100%; border:1px dashed var(--line2); background:transparent; color:var(--mut);
  border-radius:var(--r); padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:12px;
}

/* ---------- Repos ---------- */
.bigrest{text-align:center; padding:50px 10px}
.bigrest .ico{font-size:44px}
.bigrest h2{font-family:'Barlow Condensed',sans-serif; font-size:38px; text-transform:uppercase; margin:12px 0 6px}
.bigrest p{color:var(--mut); max-width:36ch; margin:0 auto}

/* ---------- Chargeur ---------- */
.loader{margin-top:11px; padding:10px 10px 8px; background:var(--bg); border:1px solid var(--line); border-radius:11px}
.loader .viz{display:flex; align-items:center; justify-content:center; gap:2px; min-height:34px}
.plate{border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--bg)}
.p5{width:30px; height:30px; background:var(--ink); font-size:10px}
.p2{width:23px; height:23px; background:var(--blu); font-size:9px; color:#fff}
.p1{width:17px; height:17px; background:var(--grn); font-size:8px; color:#fff}
.barmid{height:6px; background:linear-gradient(90deg,#585d66,#7d838d,#585d66); border-radius:3px; flex:0 0 54px; margin:0 3px}
.barend{height:12px; width:4px; background:#7d838d; border-radius:2px; flex:0 0 auto}
.loader .cap{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); text-align:center; margin-top:7px}
.loader .cap b{color:var(--mut)}
.loader.err .cap{color:var(--amber)}

/* ---------- Timer ---------- */
#timer{
  position:fixed; left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:80; display:flex; align-items:center; gap:12px;
  background:var(--blu); color:#fff; border-radius:999px; padding:12px 20px;
  box-shadow:0 8px 28px rgba(0,0,0,.5); cursor:pointer; border:none; max-width:92vw;
}
#timer .tt{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:22px}
#timer .tl{font-size:12px; opacity:.85; text-align:left; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:44vw}
#timer.hidden{display:none}
#timer.low{animation:pulse 1s infinite}
@keyframes pulse{50%{transform:translateX(-50%) scale(1.04)}}

/* ---------- Overlay ---------- */
#overlay{position:fixed; inset:0; z-index:100; background:var(--bg); overflow-y:auto; display:none; -webkit-overflow-scrolling:touch}
#overlay.open{display:block}
#overlay .inner{max-width:560px; margin:0 auto; padding:18px 16px 40px}
.closefix{
  position:fixed; top:calc(12px + env(safe-area-inset-top)); right:14px; z-index:130;
  background:var(--card); border:1px solid var(--line2); color:var(--ink);
  width:46px; height:46px; border-radius:50%; font-size:19px; cursor:pointer; display:none;
}
.closefix.show{display:block}
#overlay h2.doc{font-family:'Barlow Condensed',sans-serif; font-size:40px; text-transform:uppercase; margin:8px 0 2px; line-height:1; padding-right:52px}
#overlay .docsub{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:20px}
#overlay h3.sec{font-family:'Barlow Condensed',sans-serif; font-size:24px; text-transform:uppercase; margin:26px 0 8px; padding-top:14px; border-top:1px solid var(--line); color:var(--blu)}
#overlay p, #overlay li{font-size:14.5px; color:var(--mut); line-height:1.55}
#overlay p b, #overlay li b{color:var(--ink)}
#overlay ul{padding-left:18px; margin:8px 0}
#overlay .dayblock{margin:14px 0 4px}
#overlay .dayblock h4{font-family:'Barlow Condensed',sans-serif; font-size:19px; text-transform:uppercase; margin:0 0 2px}
#overlay .dayblock .dm{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px}
#overlay .exline{display:flex; gap:10px; padding:7px 0; border-bottom:1px dashed var(--line); font-size:14px}
#overlay .exline .xn{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--blu); flex:0 0 16px; padding-top:2px}
#overlay .exline .xb{flex:1}
#overlay .exline .xt{color:var(--ink); font-weight:500}
#overlay .exline .xm{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); margin-top:2px}
.closebottom{display:block; margin:26px auto 0; border:1px solid var(--line2); background:var(--card); color:var(--ink);
  border-radius:999px; padding:12px 28px; font-size:15px; font-weight:600; cursor:pointer}

/* ---------- v5 : toast, notes, stats, récap ---------- */
#toast{position:fixed; top:calc(14px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%) translateY(-90px);
  z-index:200; background:var(--card); border:1px solid rgba(217,164,65,.55); color:#ecd9ab;
  font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:600; letter-spacing:.03em;
  padding:11px 16px; border-radius:999px; box-shadow:0 8px 28px rgba(0,0,0,.5); transition:transform .25s; max-width:90vw; text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
#timer .tp30{font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; border:1px solid rgba(255,255,255,.45); border-radius:999px; padding:5px 9px}
.finishbtn{width:100%; border:none; background:var(--blu); color:#fff; border-radius:var(--r); padding:15px; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:12px}
.noterow{margin-top:10px}
.notebtn{border:none; background:none; color:var(--dim); font-size:12px; cursor:pointer; padding:2px 0; font-family:'IBM Plex Mono',monospace; letter-spacing:.02em}
.noteline{font-size:13px; color:var(--mut); margin-bottom:4px; line-height:1.4}
.notein{width:100%; background:var(--bg); border:1px dashed var(--blu-line); border-radius:8px; color:var(--ink); font-size:14px; padding:8px 10px; outline:none}
.badge[data-sug]{cursor:pointer}
.kpis{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:6px 0 10px}
.kpi{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 12px}
.kpi .kv{font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:600}
.kpi .kv small{font-size:11px; color:var(--dim); font-weight:500}
.kpi .kl{font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.07em; margin-top:2px}
.scard{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:13px; margin-bottom:10px}
.scard h4{font-family:'Barlow Condensed',sans-serif; font-size:17px; text-transform:uppercase; margin:0 0 8px; letter-spacing:.03em; color:var(--mut)}
.chart{width:100%; height:auto; display:block}
.ctxt{font:600 9px 'IBM Plex Mono',monospace; fill:#6c7078}
.ctxt.hi{fill:#ece9e1}
.exchips{display:flex; gap:6px; overflow-x:auto; padding:2px 0 10px; scrollbar-width:none}
.exchips::-webkit-scrollbar{display:none}
.exchip{flex:0 0 auto; border:1px solid var(--line); background:var(--card2); color:var(--mut); border-radius:999px; padding:7px 12px; font-size:13px; cursor:pointer; white-space:nowrap}
.exchip.on{border-color:var(--blu-line); background:var(--blu-soft); color:#c9d8fb; font-weight:600}
.recline{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--amber); margin:8px 0 2px; letter-spacing:.02em}
.hrow{display:flex; justify-content:space-between; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--mut); padding:6px 0; border-bottom:1px dashed var(--line)}
.hrow .hd{color:var(--dim); flex:0 0 46px}
.jrow{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:7px}
.jrow .jd{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); flex:0 0 44px; line-height:1.35}
.jrow .jn{flex:1; min-width:0}
.jrow .jn .jt{font-weight:600; font-size:14.5px}
.jrow .jn .jm{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); margin-top:2px}
.jrow .jk{font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:600; text-align:right}
.jrow .jk small{display:block; font-size:9px; color:var(--amber); font-weight:600}
.insight{border-left:3px solid var(--blu); background:var(--card); border-radius:0 12px 12px 0; padding:10px 12px; margin-bottom:8px; font-size:13.5px; color:var(--mut)}
.insight b{color:var(--ink)}
.insight.warn{border-left-color:var(--amber)}
.insight.fire{border-left-color:var(--grn)}
.setrowx{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 2px; border-bottom:1px dashed var(--line); font-size:14.5px}
.tgl{width:46px; height:27px; border-radius:999px; border:1px solid var(--line2); background:var(--card2); position:relative; cursor:pointer; flex:0 0 auto}
.tgl::after{content:""; position:absolute; top:2px; left:2px; width:21px; height:21px; border-radius:50%; background:var(--dim); transition:all .15s}
.tgl.on{background:var(--blu-soft); border-color:var(--blu-line)}
.tgl.on::after{left:21px; background:var(--blu)}
.sbtns{display:flex; gap:9px; margin-top:12px}
.sbtn{flex:1; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; background:var(--blu); color:#fff}
.sbtn.sec{background:var(--card2); border:1px solid var(--line2); color:var(--ink)}
.cempty{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); padding:14px 0; text-align:center}
.rec-big{font-family:'IBM Plex Mono',monospace; font-size:40px; font-weight:600; text-align:center; margin:6px 0 0}
.rec-big small{font-size:14px; color:var(--dim)}
.rec-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px}
.rec-pr{border:1px solid rgba(217,164,65,.4); background:rgba(217,164,65,.07); border-radius:12px; padding:10px 12px; margin-top:10px; font-size:13.5px; color:#ecd9ab}
.punch{font-family:'Barlow Condensed',sans-serif; font-size:19px; text-transform:uppercase; letter-spacing:.04em; text-align:center; margin-top:16px; color:var(--ink)}
.nextcard{margin-top:18px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--dim); letter-spacing:.03em}
.nextcard b{color:var(--mut)}

footer{margin-top:26px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase}
@media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>

/* ================= STOCKAGE ================= */
const mem = {};
const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); if(r && r.value!=null) return JSON.parse(r.value); return null; } }catch(e){}
    try{ const v = localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){}
    return (k in mem)? mem[k] : null;
  },
  async set(k,v){
    const s = JSON.stringify(v);
    try{ if(window.storage){ await window.storage.set(k,s); return; } }catch(e){}
    try{ localStorage.setItem(k,s); return; }catch(e){}
    mem[k]=v;
  }
};
const HIST = {};
let SET = {snd:true, wake:true};
const TSTART = {};
function today(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0'); }
function dkey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0'); }
async function loadHist(id){
  if(HIST[id]) return HIST[id];
  const v = await store.get('lf_'+id);
  HIST[id] = Array.isArray(v)? v : [];
  return HIST[id];
}
/* --- scoring : une métrique monotone par mode pour détecter les records --- */
function e1rm(kg,reps){ if(kg==null||reps==null||reps<=0) return null; return kg*(1+Math.min(reps,20)/30); }
function setScore(mode, x){
  if(!x) return null;
  const kg = x[0], reps = x[1];
  if(mode==='time') return (reps!=null)? reps : null;
  if(mode==='bw'){ if(reps==null) return null; return ((kg||0)+1)*(1+Math.min(reps,30)/30); }
  if(kg==null || reps==null || reps<=0) return null;
  return e1rm(kg,reps);
}
function tonOf(mode,x){
  if(!x) return 0;
  const kg=x[0]||0, reps=x[1]||0;
  if(mode==='time') return 0;
  if(mode==='pair') return kg*2*reps;
  return kg*reps;
}
function prLabel(mode,x){
  if(mode==='pair'||mode==='solo') return 'e1RM '+(Math.round(e1rm(x[0],x[1])*10)/10)+' kg';
  if(mode==='time') return x[1]+' s';
  return x[1]+' reps'+(x[0]? ' @ +'+x[0]+' kg':'');
}
function bestBeforeToday(h, mode){
  const d = today(); let best = null;
  h.forEach(en=>{ if(en.d===d || !en.s) return; en.s.forEach(x=>{ const v=setScore(mode,x); if(v!=null && (best==null||v>best)) best=v; }); });
  return best;
}
async function saveSet(sess, ex, idx, kg, reps){
  const h = await loadHist(ex.id); const d = today();
  let e = h[h.length-1];
  if(!e || e.d!==d){ e = {d:d, s:[]}; h.push(e); }
  e.s[idx] = [kg, reps];
  while(h.length>200) h.shift();
  await store.set('lf_'+ex.id, h);
  await store.set('lf_pos', sess.uid);
  if(!TSTART[d]){
    TSTART[d] = (await store.get('lf_tstart_'+d)) || Date.now();
    await store.set('lf_tstart_'+d, TSTART[d]);
  }
  const sc = setScore(ex.m, [kg, reps]);
  const best = bestBeforeToday(h, ex.m);
  if(sc!=null && best!=null && sc > best + 1e-9){
    return {pr:true, msg:'🏆 Record — '+prLabel(ex.m,[kg,reps])+' · '+ex.n};
  }
  return {pr:false};
}
async function removeSet(ex, idx){
  const h = await loadHist(ex.id); const d = today();
  const e = h[h.length-1];
  if(e && e.d===d && e.s){ e.s[idx] = null; await store.set('lf_'+ex.id, h); }
}
async function saveNote(ex, txt){
  const h = await loadHist(ex.id); const d = today();
  let e = h[h.length-1];
  if(!e || e.d!==d){ e = {d:d, s:[]}; h.push(e); }
  if(txt) e.note = txt; else delete e.note;
  await store.set('lf_'+ex.id, h);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=> t.classList.remove('show'), 3400);
}
/* --- son + écran allumé --- */
let wl = null, actx = null;
async function reqWake(){
  if(!SET.wake || !('wakeLock' in navigator)) return;
  try{ wl = await navigator.wakeLock.request('screen'); }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && wl) reqWake(); });
function ensureAudio(){
  if(!SET.snd) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
  }catch(e){}
}
function beep(){
  if(!SET.snd || !actx) return;
  try{
    const t = actx.currentTime;
    [0, 0.2].forEach((off,i)=>{
      const o = actx.createOscillator(), g = actx.createGain();
      o.frequency.value = i? 990 : 660;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(0.0001, t+off);
      g.gain.exponentialRampToValueAtTime(0.35, t+off+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+off+0.16);
      o.start(t+off); o.stop(t+off+0.18);
    });
  }catch(e){}
}

/* ================= CHARGEUR DE DISQUES ================= */
function sideCompo(kg, solo){
  if(!kg || isNaN(kg)) return null;
  const max = solo? 32 : 20;
  if(kg < 2) return {err:"Minimum 2 kg (la barre seule)"};
  if(kg > max) return {err:"Max "+max+" kg "+(solo? "sur un haltère (filetage)" : "par main en paire")};
  if((kg-2) % 2 !== 0) return {err:"Charge paire uniquement (disques symétriques)"};
  let need = (kg-2)/2;
  const pool = solo? {5:2,2:2,1:4} : {5:1,2:1,1:2};
  const out = [];
  for(const p of [5,2,1]){ while(need>=p && pool[p]>0){ out.push(p); pool[p]--; need-=p; } }
  return need>0 ? {err:"Pas faisable avec tes disques"} : {plates:out};
}
function loaderHTML(kg, solo){
  const c = sideCompo(kg, solo);
  if(!c) return "";
  if(c.err) return '<div class="loader err"><div class="cap">'+c.err+'</div></div>';
  const P = p => '<span class="plate p'+p+'">'+p+'</span>';
  const left = c.plates.slice().reverse().map(P).join('');
  const right = c.plates.map(P).join('');
  const capTxt = c.plates.length ? "barre 2 kg + <b>"+c.plates.join(" · ")+"</b> par côté" : "barre seule (2 kg)";
  return '<div class="loader"><div class="viz">'+left+'<span class="barend"></span><span class="barmid"></span><span class="barend"></span>'+right+'</div>'+
         '<div class="cap">'+kg+' kg '+(solo?'(1 haltère)':'/ main')+' = '+capTxt+'</div></div>';
}

/* ================= TIMER ================= */
let tInt=null, tEnd=0, tGen=0;
const tEl=document.getElementById('timer'), ttEl=document.getElementById('tt'), tlEl=document.getElementById('tl');
function startTimer(sec, label){
  clearInterval(tInt); tGen++;
  tEnd = Date.now() + sec*1000;
  tEl.classList.remove('hidden','low');
  tlEl.textContent = "Repos · " + label;
  tick();
  tInt = setInterval(tick, 250);
}
function tick(){
  const left = Math.max(0, Math.round((tEnd-Date.now())/1000));
  ttEl.textContent = Math.floor(left/60)+":"+String(left%60).padStart(2,'0');
  if(left<=10) tEl.classList.add('low');
  if(left<=0){
    clearInterval(tInt);
    ttEl.textContent = "GO";
    tlEl.textContent = "Série suivante";
    beep();
    if(navigator.vibrate) navigator.vibrate([180,90,180]);
    const g = tGen;
    setTimeout(()=>{ if(g===tGen) tEl.classList.add('hidden'); }, 4000);
  }
}
tEl.addEventListener('click', ()=>{ clearInterval(tInt); tEl.classList.add('hidden'); });
document.getElementById('tp30').addEventListener('click', (ev)=>{
  ev.stopPropagation();
  tEnd = Math.max(tEnd, Date.now()) + 30000;
  clearInterval(tInt); tGen++;
  tEl.classList.remove('hidden','low');
  tlEl.textContent = tlEl.textContent.replace('Série suivante','Repos');
  tick();
  tInt = setInterval(tick, 250);
});

  const prev = [...h].reverse().find(e=>e.d!==today() && e.s && e.s.some(x=>x));
  if(!prev) return {html:'', prev:null};
  const parts = prev.s.filter(x=>x).map(x=> (x[1]??'–'));
  const kg = prev.s.find(x=>x && x[0]!=null)?.[0];
  const kgTxt = (kg!=null)? kg+' kg · ' : '';
  const noteTxt = prev.note? '<div class="noteline">📝 '+esc(prev.note)+'</div>' : '';
  return {html:'<div class="last">Dernier ('+prev.d.slice(5).split('-').reverse().join('/')+') : '+kgTxt+parts.join(' / ')+' reps</div>'+noteTxt, prev};
}
function progBadge(ex, prev){
  if(!prev || !Array.isArray(ex.r)) return '';
  const logged = prev.s.filter(x=>x && x[1]!=null);
  if(logged.length >= ex.s && logged.every(x=>x[1] >= ex.r[1])){
    if(ex.m==='pair'||ex.m==='solo'){
      const kg = logged.find(x=>x[0]!=null)?.[0];
      return '<div class="badge"'+(kg!=null? ' data-sug="'+(kg+2)+'"':'')+'>▲ Haut de fourchette atteint — passe à '+(kg!=null?(kg+2)+' kg (tape ici)':'+2 kg')+'</div>';
    }
    return '<div class="badge">▲ Haut de fourchette atteint — ajoute du lest ou durcis la variante</div>';
  }
  return '';
}

const MODES = [['pair','2 haltères'],['solo','1 haltère'],['bw','Poids du corps'],['time','Durée (s)']];

function editControlsHTML(ex){
  const segs = MODES.map(m=>'<button class="seg'+(ex.m===m[0]?' on':'')+'" data-m="'+m[0]+'">'+m[1]+'</button>').join('');
  let s = '<div class="editp">'+
   '<div class="segs">'+segs+'</div>'+
   '<div class="steprow">'+
     '<div class="stepper"><button class="sb" data-a="s-">−</button><div><div class="sv e-s">'+ex.s+'</div><div class="sl">séries</div></div><button class="sb" data-a="s+">+</button></div>'+
     '<div class="stepper"><button class="sb" data-a="r-">−</button><div><div class="sv e-rest">'+fmtRest(ex.rest)+'</div><div class="sl">repos</div></div><button class="sb" data-a="r+">+</button></div>'+
   '</div>'+
   '<div class="steprow"><div class="stepper"><div><input type="number" class="repin e-rmin" value="'+ex.r[0]+'"><div class="sl" style="text-align:center;margin-top:4px">reps min</div></div></div>'+
   '<div class="stepper"><div><input type="number" class="repin e-rmax" value="'+ex.r[1]+'"><div class="sl" style="text-align:center;margin-top:4px">reps max</div></div></div></div>'+
   '<div class="editactions">'+
     '<button class="ebtn" data-a="up">↑</button><button class="ebtn" data-a="down">↓</button>'+
     '<button class="ebtn ghost" data-a="clear">Effacer l\'historique</button>'+
     '<button class="ebtn danger" data-a="del">Supprimer</button>'+
     '<button class="ebtn primary" data-a="ok" style="margin-left:auto">OK</button>'+
   '</div>';

  /* --- Section historique & liaisons --- */
  const links = linkedTo(ex);
  s += '<div class="linksec">';
  s += '<div class="lkstatus">'+(links.length
    ? '🔗 Historique partagé avec : <b>'+links.map(o=>o.e.n+' ('+sessLabel(o.S)+')').join(', ')+'</b>'
    : 'Historique indépendant — aucun lien actif.')+'</div>';
  s += '<div class="editactions">';
  if(links.length) s += '<button class="ebtn danger" data-a="unlink">Délier</button>';
  s += '<button class="ebtn" data-a="linkto">'+(linkMode?'Annuler':'Lier à…')+'</button>';
  s += '<button class="ebtn" data-a="dup">'+(dupMode?'Annuler':'Dupliquer vers…')+'</button>';
  s += '</div>';
  if(linkMode){
    s += '<div class="lkstatus">Choisis l\'exercice de référence : <b>son historique devient l\'historique commun</b> (celui de « '+ex.n+' » sera écrasé).</div>';
    prog.sessions.forEach((S2,si)=>{
      if(S2.ex) S2.ex.forEach((e2,ei)=>{
        if(e2!==ex && e2.id!==ex.id){
          s += '<button class="lkrow" data-link="'+si+':'+ei+'"><small>'+sessLabel(S2)+'</small>'+e2.n+'</button>';
        }
      });
    });
  }
  if(dupMode){
    s += '<div class="lkstatus">Copie liée (nom, consigne, réglages + historique partagé) vers :</div>';
    prog.sessions.forEach((S2,si)=>{
      if(!S2.rest) s += '<button class="lkrow" data-dup="'+si+'">'+sessLabel(S2)+'</button>';
    });
  }
  s += '</div></div>';
  return s;
}

async function render(){
  const S = prog.sessions[selIdx];
  app.innerHTML = '';

  if(S.rest){
    let j = (selIdx+1) % prog.sessions.length;
    while(prog.sessions[j].rest) j = (j+1) % prog.sessions.length;
    const nx = prog.sessions[j];
    app.innerHTML = '<div class="bigrest"><div class="ico">😴</div><h2>Repos</h2><p>C\'est ici que le muscle se construit. 7–9 h de sommeil, tes protéines.</p>'+
      '<div class="nextcard">Prochaine séance : <b>'+sessLabel(nx)+'</b> · '+(nx.ex? nx.ex.length : 0)+' exercices</div></div>';
    return;
  }

  let head = '<div class="dayhead"><h2>'+S.t+' <span style="color:var(--blu)">'+(S.tag||'')+'</span></h2><div class="sub">'+S.sub+'</div><div class="meta">'+S.dur+'</div></div>';
  if(S.log) head += '<div class="logistics">'+S.log+'</div>';
  app.insertAdjacentHTML('beforeend', head);

  if(S.warm){
    app.insertAdjacentHTML('beforeend',
      '<div class="card warm"><h3><span class="num">00</span> Échauffement — 6-8 min</h3><ul class="warmlist">'+
      S.warm.map(w=>'<li>'+w+'</li>').join('')+'</ul></div>');
  }

  let sessionHasToday = false;
  for(let x=0; x<S.ex.length; x++){
    const ex = S.ex[x];
    const h = await loadHist(ex.id);
    const {html:lastHtml, prev} = lastLine(ex, h);
    const todayEntry = h.find(e=>e.d===today());
    if(todayEntry && todayEntry.s && todayEntry.s.some(x2=>x2)) sessionHasToday = true;
    const isLinked = linkedTo(ex).length>0;

    const repTxt = ex.m==='time' ? ex.r[0]+'–'+ex.r[1]+' s' : ex.r[0]+'–'+ex.r[1]+' reps';
    const uniTxt = ex.uni? ' / '+ex.uni : '';
    const meta = ex.s+' × '+repTxt+uniTxt+' · repos '+fmtRest(ex.rest);

    const isEd = (editIdx===x);
    const isCol = collapsed.has(ex) && !isEd;

    const card = document.createElement('div');
    card.className='card';
    let inner = '<button class="fold" aria-label="Enrouler / dérouler">'+(isCol?'▸':'▾')+'</button>'+
                '<button class="pencil" aria-label="Modifier">✎</button>';
    if(isEd){
      inner += '<h3><span class="num">'+String(x+1).padStart(2,'0')+'</span><input type="text" class="e-n hdrin" value="'+ex.n.replace(/"/g,'&quot;')+'"></h3>'+
               '<textarea class="e-c cuein" rows="2" placeholder="Consigne…">'+(ex.cue||'')+'</textarea>'+
               editControlsHTML(ex);
    }else{
      inner += '<h3><span class="num">'+String(x+1).padStart(2,'0')+'</span> '+ex.n+(isLinked?' <span class="lk" title="Historique partagé">🔗</span>':'')+'</h3>'+
               '<div class="exmeta">'+meta+'</div>';
      if(!isCol){
        inner += (ex.cue? '<p class="cue">'+ex.cue+'</p>' : '')+ lastHtml + progBadge(ex, prev);
      }
    }

    if(!isCol){
    inner += '<div class="sets">';
    for(let i=0;i<ex.s;i++){
      const t = todayEntry?.s?.[i];
      const pKg = t?.[0] ?? prev?.s?.[i]?.[0] ?? prev?.s?.filter(Boolean).slice(-1)[0]?.[0] ?? '';
      const pReps = t?.[1] ?? '';
      const phReps = prev?.s?.[i]?.[1] ?? ex.r[1];
      const done = t? ' done':'';
      const kgPh = ex.m==='bw' ? 'lest' : 'kg';
      const kgUnit = ex.m==='solo' ? 'kg (1 haltère)' : (ex.m==='bw' ? 'lest (option)' : 'kg / main');
      if(ex.m==='time'){
        inner += '<div class="setrow'+done+'" data-i="'+i+'" style="grid-template-columns:26px 1fr 46px">'+
          '<div class="sn">S'+(i+1)+'</div>'+
          '<div><input type="number" inputmode="numeric" class="reps" value="'+(pReps!==''?pReps:'')+'" placeholder="'+phReps+'"><div class="unit">secondes</div></div>'+
          '<button class="ck" aria-label="Valider">✓</button></div>';
      }else{
        inner += '<div class="setrow'+done+'" data-i="'+i+'">'+
          '<div class="sn">S'+(i+1)+'</div>'+
          '<div><input type="number" inputmode="decimal" class="kg" value="'+(pKg!==''?pKg:'')+'" placeholder="'+kgPh+'"><div class="unit">'+kgUnit+'</div></div>'+
          '<div><input type="number" inputmode="numeric" class="reps" value="'+(pReps!==''?pReps:'')+'" placeholder="'+phReps+'"><div class="unit">reps</div></div>'+
          '<button class="ck" aria-label="Valider">✓</button></div>';
      }
    }
    inner += '</div>';
    if(ex.m==='pair'||ex.m==='solo'){ inner += '<div class="loaderbox" data-solo="'+(ex.m==='solo')+'"></div>'; }
    if(!isEd){
      const nTxt = (todayEntry && todayEntry.note)? todayEntry.note : '';
      inner += '<div class="noterow">'+(nTxt? '<div class="noteline">📝 '+esc(nTxt)+'</div>':'')+
               '<button class="notebtn" data-nb>'+(nTxt? '✎ Modifier la note':'📝 Note du jour')+'</button></div>';
    }
    }
    card.innerHTML = inner;
    app.appendChild(card);

    /* --- wiring exercice --- */
    const box = card.querySelector('.loaderbox');
    const firstKg = card.querySelector('.setrow .kg');
    const updLoader = ()=>{ if(box && firstKg){ box.innerHTML = loaderHTML(parseFloat(firstKg.value), box.dataset.solo==='true'); } };
    updLoader();

    card.querySelectorAll('.setrow').forEach(row=>{
      const i = +row.dataset.i;
      const kgIn = row.querySelector('.kg');
      const rIn = row.querySelector('.reps');
      if(kgIn && row===card.querySelector('.setrow')) kgIn.addEventListener('input', updLoader);
      row.querySelector('.ck').addEventListener('click', async ()=>{
        if(row.classList.contains('done')){
          row.classList.remove('done');
          await removeSet(ex, i);
          return;
        }
        row.classList.add('done');
        ensureAudio(); reqWake();
        const kg = kgIn && kgIn.value!=='' ? parseFloat(kgIn.value) : null;
        const reps = rIn && rIn.value!=='' ? parseFloat(rIn.value) : null;
        const res = await saveSet(S, ex, i, kg, reps);
        if(res && res.pr) showToast(res.msg);
        startTimer(ex.rest, ex.n);
        addFinishBtn(S);
      });
      [kgIn, rIn].forEach(inp=>{ if(inp) inp.addEventListener('change', async ()=>{
        if(row.classList.contains('done')){
          const kg = kgIn && kgIn.value!=='' ? parseFloat(kgIn.value) : null;
          const reps = rIn && rIn.value!=='' ? parseFloat(rIn.value) : null;
          await saveSet(S, ex, i, kg, reps);
        }
      });});
    });

    card.querySelector('.fold').addEventListener('click', ()=>{
      if(collapsed.has(ex)){ collapsed.delete(ex); }
      else { collapsed.add(ex); if(editIdx===x){ editIdx=null; linkMode=false; dupMode=false; } }
      render();
    });
    card.querySelector('.pencil').addEventListener('click', ()=>{
      editIdx = (editIdx===x)? null : x;
      if(editIdx===x) collapsed.delete(ex);
      linkMode = false; dupMode = false;
      render();
    });

    const bdg = card.querySelector('.badge[data-sug]');
    if(bdg) bdg.addEventListener('click', ()=>{
      card.querySelectorAll('.setrow .kg').forEach(inp=>{ inp.value = bdg.dataset.sug; });
      updLoader();
    });
    const nb = card.querySelector('[data-nb]');
    if(nb) nb.addEventListener('click', ()=>{
      const cur = (todayEntry && todayEntry.note) || '';
      const rowN = card.querySelector('.noterow');
      rowN.innerHTML = '<input type="text" class="notein" value="'+esc(cur)+'" placeholder="banc à 30°, coude ok, sensation…">';
      const inp = rowN.querySelector('.notein');
      inp.focus();
      let doneN = false;
      const finN = async ()=>{ if(doneN) return; doneN = true; await saveNote(ex, inp.value.trim()); render(); };
      inp.addEventListener('change', finN);
      inp.addEventListener('blur', finN);
    });

    /* --- wiring éditeur --- */
    const ep = card.querySelector('.editp');
    if(ep){
      const readBack = ()=>{
        const nIn = card.querySelector('.e-n'), cIn = card.querySelector('.e-c');
        if(nIn) ex.n = nIn.value.trim() || ex.n;
        if(cIn) ex.cue = cIn.value.trim();
        const rmin = parseInt(ep.querySelector('.e-rmin').value)||ex.r[0];
        const rmax = parseInt(ep.querySelector('.e-rmax').value)||ex.r[1];
        ex.r = [Math.max(1,Math.min(rmin,rmax)), Math.max(rmin,rmax)];
      };
      [card.querySelector('.e-n'), card.querySelector('.e-c'), ep.querySelector('.e-rmin'), ep.querySelector('.e-rmax')].forEach(inp=>{
        if(inp) inp.addEventListener('change', async ()=>{ readBack(); await saveProg(); });
      });
      ep.querySelectorAll('.seg').forEach(sg=> sg.addEventListener('click', ()=>{
        readBack(); ex.m = sg.dataset.m; saveProg().then(render);
      }));
      ep.querySelectorAll('[data-a]').forEach(b=> b.addEventListener('click', async ()=>{
        const a = b.dataset.a;
        if(a==='s+') ex.s = Math.min(8, ex.s+1);
        if(a==='s-') ex.s = Math.max(1, ex.s-1);
        if(a==='r+') ex.rest = Math.min(600, ex.rest+15);
        if(a==='r-') ex.rest = Math.max(30, ex.rest-15);
        if(a==='up' && x>0){ readBack(); S.ex.splice(x-1,0,S.ex.splice(x,1)[0]); editIdx=x-1; }
        if(a==='down' && x<S.ex.length-1){ readBack(); S.ex.splice(x+1,0,S.ex.splice(x,1)[0]); editIdx=x+1; }
        if(a==='clear'){ if(confirm("Effacer l'historique de « "+ex.n+" » ?"+(linkedTo(ex).length? "\nAttention : historique partagé — il sera effacé aussi pour "+linkedTo(ex).map(o=>o.e.n+' ('+sessLabel(o.S)+')').join(', ')+"." : ""))){ HIST[ex.id]=[]; await store.set('lf_'+ex.id, []); } }
        if(a==='del'){ if(confirm("Supprimer « "+ex.n+" » de la séance ?"+(linkedTo(ex).length? "\n(Son jumeau lié garde tout l'historique.)":""))){ S.ex.splice(x,1); editIdx=null; linkMode=false; dupMode=false; } }
        if(a==='unlink'){
          const names = linkedTo(ex).map(o=>o.e.n+' ('+sessLabel(o.S)+')').join(', ');
          if(confirm("Délier « "+ex.n+" » ?\nIl repart avec un historique vierge. "+names+" conserve tout l'historique existant.")){
            readBack();
            ex.id = 'x'+Date.now().toString(36);
            linkMode=false; dupMode=false;
          }
        }
        if(a==='linkto'){ readBack(); linkMode = !linkMode; dupMode = false; }
        if(a==='dup'){ readBack(); dupMode = !dupMode; linkMode = false; }
        if(a==='ok'){ readBack(); editIdx=null; linkMode=false; dupMode=false; }
        await saveProg(); render();
      }));
      ep.querySelectorAll('[data-link]').forEach(b=> b.addEventListener('click', async ()=>{
        const parts = b.dataset.link.split(':');
        const target = prog.sessions[+parts[0]].ex[+parts[1]];
        if(confirm("Lier « "+ex.n+" » à « "+target.n+" » ?\nL'historique de « "+target.n+" » devient l'historique commun aux deux. L'historique actuel de « "+ex.n+" » est écrasé.")){
          readBack();
          ex.id = target.id;
          linkMode = false;
          await saveProg(); render();
        }
      }));
      ep.querySelectorAll('[data-dup]').forEach(b=> b.addEventListener('click', async ()=>{
        const si = +b.dataset.dup;
        readBack();
        const copy = JSON.parse(JSON.stringify(ex));
        prog.sessions[si].ex.push(copy);
        dupMode = false;
        await saveProg(); render();
      }));
    }
  }

  const add = document.createElement('button');
  add.className='addex'; add.textContent='+ Ajouter un exercice';
  add.onclick = async ()=>{
    S.ex.push({id:'x'+Date.now().toString(36), n:'Nouvel exercice', m:'pair', s:3, r:[8,12], rest:180, cue:''});
    editIdx = S.ex.length-1;
    linkMode=false; dupMode=false;
    await saveProg(); render();
  };
  app.appendChild(add);
  if(sessionHasToday) addFinishBtn(S);
}

function addFinishBtn(S){
  if(document.getElementById('finishbtn')) return;
  const fin = document.createElement('button');
  fin.id='finishbtn'; fin.className='finishbtn'; fin.textContent='Terminer la séance';
  fin.onclick = ()=> showRecap(S);
  const anchor = app.querySelector('.addex');
  if(anchor) app.insertBefore(fin, anchor); else app.appendChild(fin);
}

/* ================= RÉCAP DE SÉANCE ================= */
function fmtTon(kg){ return kg>=1000 ? (Math.round(kg/100)/10)+' t' : Math.round(kg)+' kg'; }
function fmtDur(min){ if(min==null) return null; return min>=60 ? Math.floor(min/60)+'h'+String(min%60).padStart(2,'0') : min+' min'; }
async function showRecap(S){
  const d = today();
  let sets=0, ton=0, exos=0; const prs=[]; const prevDates = new Set();
  for(const ex of S.ex){
    const h = await loadHist(ex.id);
    h.forEach(e=>{ if(e.d!==d && e.s && e.s.some(x=>x)) prevDates.add(e.d); });
    const te = h.find(e=>e.d===d);
    if(!te || !te.s) continue;
    const logged = te.s.filter(x=>x && (x[0]!=null || x[1]!=null));
    if(!logged.length) continue;
    exos++;
    logged.forEach(x=>{ sets++; ton += tonOf(ex.m,x); });
    const best = bestBeforeToday(h, ex.m);
    let bt=null, bx=null;
    logged.forEach(x=>{ const v=setScore(ex.m,x); if(v!=null && (bt==null||v>bt)){ bt=v; bx=x; } });
    if(bt!=null && best!=null && bt>best+1e-9) prs.push(ex.n+' · '+prLabel(ex.m,bx));
  }
  const prev = [...prevDates].sort().pop();
  let prevTon = null;
  if(prev){
    prevTon = 0;
    for(const ex of S.ex){
      const h = await loadHist(ex.id);
      const pe = h.find(e=>e.d===prev);
      if(pe && pe.s) pe.s.forEach(x=>{ if(x) prevTon += tonOf(ex.m,x); });
    }
  }
  const t0 = TSTART[d] || (await store.get('lf_tstart_'+d));
  const dur = t0 ? Math.max(1, Math.round((Date.now()-t0)/60000)) : null;
  const delta = (prevTon && prevTon>0) ? Math.round((ton-prevTon)/prevTon*100) : null;

  let punch;
  if(prs.length) punch = 'La fonte a parlé.';
  else if(delta!=null && delta>2) punch = 'La courbe est de ton côté.';
  else punch = 'Volume posé. La croissance, c\'est cette nuit.';

  let s = '<h2 class="doc">Séance pliée</h2><div class="docsub">'+sessLabel(S)+' · '+d.split('-').reverse().join('/')+'</div>';
  s += '<div class="scard"><div class="rec-big">'+fmtTon(ton)+'<small> déplacés</small></div>';
  s += '<div class="rec-grid">';
  s += '<div class="kpi"><div class="kv">'+sets+'</div><div class="kl">séries</div></div>';
  s += '<div class="kpi"><div class="kv">'+exos+'</div><div class="kl">exercices</div></div>';
  s += '<div class="kpi"><div class="kv">'+(dur!=null? fmtDur(dur) : '–')+'</div><div class="kl">durée</div></div>';
  s += '</div>';
  if(delta!=null) s += '<div class="recline" style="color:'+(delta>=0? 'var(--grn)':'var(--amber)')+'">'+(delta>=0?'▲ +':'▼ ')+delta+' % de tonnage vs '+prev.split('-').reverse().join('/')+'</div>';
  prs.forEach(p=> s += '<div class="rec-pr">🏆 '+p+'</div>');
  s += '<div class="punch">'+punch+'</div></div>';
  s += '<button class="closebottom" id="recapClose">Fermer</button>';
  document.getElementById('ovinner').innerHTML = s;
  overlay.classList.add('open'); closeFix.classList.add('show'); overlay.scrollTop = 0;
  document.getElementById('recapClose').onclick = closeOv;
}

/* ================= STATS : COLLECTE ================= */
async function collectAll(){
  const map = {};
  prog.sessions.forEach(S=>{ if(S.ex) S.ex.forEach(ex=>{
    if(!map[ex.id]) map[ex.id] = {id:ex.id, name:ex.n, mode:ex.m, sess:[sessLabel(S)]};
    else if(map[ex.id].sess.indexOf(sessLabel(S))<0) map[ex.id].sess.push(sessLabel(S));
  });});
  for(const id of Object.keys(map)){
    const h = await loadHist(id);
    map[id].entries = h.filter(e=> e.s && e.s.some(x=>x && (x[0]!=null||x[1]!=null)))
                       .slice().sort((a,b)=> a.d<b.d? -1:1);
  }
  return map;
}
function buildDays(map){
  const days = {};
  Object.values(map).forEach(m=>{
    let runBest = null;
    m.entries.forEach(en=>{
      const D = days[en.d] || (days[en.d]={d:en.d, sets:0, ton:0, exos:0, pr:0, ids:[]});
      const logged = en.s.filter(x=>x && (x[0]!=null||x[1]!=null));
      let dayBest = null;
      logged.forEach(x=>{ D.sets++; D.ton += tonOf(m.mode,x); const v=setScore(m.mode,x); if(v!=null && (dayBest==null||v>dayBest)) dayBest=v; });
      if(logged.length){ D.exos++; D.ids.push(m.id); }
      if(dayBest!=null){
        if(runBest!=null && dayBest>runBest+1e-9) D.pr++;
        if(runBest==null || dayBest>runBest) runBest = dayBest;
      }
    });
  });
  return Object.values(days).sort((a,b)=> a.d<b.d? -1:1);
}
function guessSession(ids){
  let best=null, bestN=0;
  prog.sessions.forEach(S=>{
    if(!S.ex) return;
    const n = S.ex.filter(e=> ids.indexOf(e.id)>=0).length;
    if(n>bestN){ bestN=n; best=S; }
  });
  return best? sessLabel(best) : '—';
}

/* ================= STATS : CHARTS SVG ================= */
function fmtV(v,u){ const r = Math.round(v*10)/10; return r+(u? '\u2009'+u : ''); }
function svgLine(pts, opt){
  opt = opt||{};
  if(!pts || pts.length<2) return '<div class="cempty">Encore trop peu de données — il faut 2 séances minimum.</div>';
  const w=opt.w||320, h=opt.h||120, p=16;
  const ys = pts.map(q=>q.y);
  let mn = Math.min.apply(null,ys), mx = Math.max.apply(null,ys);
  if(mx-mn<1e-9) mx = mn+1;
  const X=i=> p + i*(w-2*p)/(pts.length-1);
  const Y=v=> h-p - (v-mn)*(h-2*p)/(mx-mn);
  const path = pts.map((q,i)=> (i?'L':'M')+X(i).toFixed(1)+' '+Y(q.y).toFixed(1)).join(' ');
  const area = path+' L'+X(pts.length-1).toFixed(1)+' '+(h-p)+' L'+X(0).toFixed(1)+' '+(h-p)+' Z';
  const dots = pts.map((q,i)=>'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(q.y).toFixed(1)+'" r="2.6" fill="'+(opt.color||'#4a7df0')+'"/>').join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart">'+
    '<path d="'+area+'" fill="rgba(74,125,240,.10)"/>'+
    '<path d="'+path+'" fill="none" stroke="'+(opt.color||'#4a7df0')+'" stroke-width="2"/>'+dots+
    '<text x="'+p+'" y="11" class="ctxt">'+fmtV(pts[0].y, opt.unit)+'</text>'+
    '<text x="'+(w-p)+'" y="11" text-anchor="end" class="ctxt hi">'+fmtV(pts[pts.length-1].y, opt.unit)+'</text>'+
    '</svg>';
}
function svgBars(vals, opt){
  opt = opt||{};
  if(!vals || !vals.length) return '<div class="cempty">Rien à afficher pour l\'instant.</div>';
  const w=opt.w||320, h=opt.h||92, p=8;
  const mx = Math.max.apply(null, vals.map(v=>v.y).concat([1]));
  const bw = (w-2*p)/vals.length;
  let s = '<svg viewBox="0 0 '+w+' '+h+'" class="chart">';
  vals.forEach((v,i)=>{
    const bh = Math.max(2, (v.y/mx)*(h-28));
    s += '<rect x="'+(p+i*bw+bw*0.18).toFixed(1)+'" y="'+(h-16-bh).toFixed(1)+'" width="'+(bw*0.64).toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="2" fill="'+(opt.color||'#4a7df0')+'" opacity="'+(i===vals.length-1? 1 : 0.55)+'"/>';
    if(v.lab) s += '<text x="'+(p+i*bw+bw/2).toFixed(1)+'" y="'+(h-4)+'" text-anchor="middle" class="ctxt">'+v.lab+'</text>';
  });
  return s+'</svg>';
}

/* ================= STATS : VUE ================= */
let statsSel = null;
function exMetric(m, en){
  let best=null, lest=null;
  en.s.forEach(x=>{
    if(!x) return;
    if(m.mode==='pair'||m.mode==='solo'){ const v=e1rm(x[0],x[1]); if(v!=null && (best==null||v>best)) best=v; }
    else if(m.mode==='time'){ if(x[1]!=null && (best==null||x[1]>best)) best=x[1]; }
    else { if(x[1]!=null && (best==null||x[1]>best)) best=x[1]; if(x[0]!=null && (lest==null||x[0]>lest)) lest=x[0]; }
  });
  return {best, lest};
}
function exSummary(m, en){
  const reps = en.s.filter(x=>x).map(x=> x[1]!=null? x[1] : '–').join('/');
  const kg = en.s.filter(x=>x && x[0]!=null).map(x=>x[0]);
  const mk = kg.length? Math.max.apply(null,kg) : null;
  if(m.mode==='time') return reps+' s';
  if(m.mode==='bw') return reps+' reps'+(mk? ' @ +'+mk+' kg':'');
  return (mk!=null? mk+' kg · ':'')+reps;
}

    const pts = m.entries.map(en=>{ const r=exMetric(m,en); return {y:r.best!=null? r.best : 0}; }).filter(q=>q.y>0);
    const unit = (m.mode==='pair'||m.mode==='solo')? 'kg e1RM' : (m.mode==='time'? 's' : 'reps');

    if(recEn) s += '<div class="recline">🏆 Record : '+prLabel(m.mode,recX)+' — '+recEn.d.split('-').reverse().join('/')+'</div>';

function tonAll(m){ let t=0; m.entries.forEach(en=> en.s.forEach(x=>{ if(x) t+=tonOf(m.mode,x); })); return t; }
function insightsHTML(map, days){
  const out = [];
  const now = new Date();
  /* absence */
  if(days.length){
    const last = days[days.length-1].d;
    const diff = Math.round((now - new Date(last+'T12:00:00'))/86400000);
    if(diff>=3){
      out.push('<div class="insight warn"><b>'+diff+' jours</b> sans séance. Le cycle t\'attend — la reprise est la seule série qui compte.</div>');
    }
  }
  /* stagnation + feu */
  const stagn = [], fires = [];
  Object.values(map).forEach(m=>{
    if(m.entries.length<3) return;
    const vals = m.entries.map(en=>{ let b=null; en.s.forEach(x=>{ const v=setScore(m.mode,x); if(v!=null&&(b==null||v>b)) b=v; }); return b; }).filter(v=>v!=null);
    if(vals.length<3) return;
    const l3 = vals.slice(-3);
    if(l3[2] <= l3[0]*1.01) stagn.push(m.name);
    const l5 = vals.slice(-5);
    const gain = (l5[l5.length-1]-l5[0]) / Math.max(l5[0],1e-9) * 100;
    if(gain>3) fires.push({n:m.name, g:Math.round(gain)});
  });
  if(fires.length){
    fires.sort((a,b)=>b.g-a.g);
    out.push('<div class="insight fire">En feu : <b>'+fires[0].n+'</b> — +'+fires[0].g+' % sur les 5 dernières séances.</div>');
  }
  if(stagn.length===1) out.push('<div class="insight warn"><b>'+stagn[0]+'</b> stagne depuis 3 séances. Options : −2 kg et plus de reps, tempo 3-1-1, ou vérifier le sommeil.</div>');
  if(stagn.length>=2) out.push('<div class="insight warn"><b>'+stagn.length+' exercices stagnent</b> ('+stagn.slice(0,3).join(', ')+'…). Le meilleur investissement : un cycle deload à −40 % de séries, puis ça repart.</div>');
  if(!out.length) out.push('<div class="insight">Tout roule. Les insights se déclenchent quand quelque chose mérite ton attention — stagnation, progression forte, absence.</div>');
  return out.join('');
}

      for(const ex of (prog.sessions[i].ex||[])){
        const h = await loadHist(ex.id);
        if(h.some(e=>e.d===t && e.s && e.s.some(x=>x))){ loggedToday = true; break; }
      }
      if(loggedToday){
        selIdx = i;
      }else{
        let j = (i+1) % prog.sessions.length;
        while(prog.sessions[j].rest) j = (j+1) % prog.sessions.length;
        selIdx = j;
      }
    }
  }
  buildChips();
  banner();
  render();
})();
</script>
