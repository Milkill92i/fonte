<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17191d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Table">
<link rel="apple-touch-icon" href="table-icon.png">
<link rel="manifest" href="table.webmanifest">
<title>La Table — Recomp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#17191d; --card:#1f2227; --card2:#262a31; --line:#30343c; --line2:#3a3f48;
  --ink:#ece9e1; --mut:#9a9ea6; --dim:#6c7078;
  --blu:#4a7df0; --blu-soft:rgba(74,125,240,.14); --blu-line:rgba(74,125,240,.45);
  --grn:#43a066; --grn-soft:rgba(67,160,102,.14);
  --amb:#d9a441; --amb-soft:rgba(217,164,65,.12);
  --red:#d96a5a;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; background:var(--bg); color:var(--ink); font-family:'Barlow',system-ui,sans-serif; font-size:16px; line-height:1.45; padding-bottom:110px}
.wrap{max-width:520px; margin:0 auto; padding:0 14px}
button{font-family:inherit}
.iP{color:#9db9f7; font-weight:600}
.iF{color:var(--amb); font-weight:600}
.iC{color:#7cc79b; font-weight:600}

header.top{position:sticky; top:0; z-index:50; background:linear-gradient(var(--bg) 82%, rgba(23,25,29,0)); padding-top:env(safe-area-inset-top)}
.brandrow{display:flex; align-items:center; justify-content:space-between; padding:14px 2px 10px}
.brand .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase}
.brand h1{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:30px; letter-spacing:.02em; margin:0; line-height:1; text-transform:uppercase}
.brand h1 span{color:var(--grn)}
.docbtn{border:1px solid var(--line2); background:var(--card); color:var(--ink);
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:15px; letter-spacing:.05em;
  padding:9px 14px; border-radius:999px; cursor:pointer; text-transform:uppercase}
.docbtn:active{transform:scale(.97)}

.datenav{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:2px 0 12px}
.datenav .arrow{width:40px; height:36px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--mut); font-size:17px; cursor:pointer}
.datenav .dl{font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:19px; text-transform:uppercase; letter-spacing:.04em; text-align:center; flex:1}
.datenav .dl small{display:block; font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--dim); letter-spacing:.1em; margin-top:1px}

.gauges{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 14px 14px; margin-bottom:10px}
.kcalrow{display:flex; align-items:baseline; gap:8px; justify-content:center}
.kcalrow .big{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:34px; letter-spacing:-.01em}
.kcalrow .of{font-family:'IBM Plex Mono',monospace; font-size:15px; color:var(--dim)}
.kcalrow .u{font-family:'Barlow Condensed',sans-serif; font-size:14px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em}
.kbar{height:8px; border-radius:5px; background:var(--bg); border:1px solid var(--line); margin:11px 2px 4px; overflow:hidden}
.kbar i{display:block; height:100%; background:var(--ink); border-radius:5px; transition:width .3s}
.kleft{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); text-align:center; letter-spacing:.04em}
.macros{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:13px}
.mc{background:var(--card2); border:1px solid var(--line); border-radius:11px; padding:9px 9px 8px; text-align:center}
.mc .ml{font-family:'Barlow Condensed',sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:.08em; font-weight:600}
.mc .mv{font-family:'IBM Plex Mono',monospace; font-size:14.5px; font-weight:600; margin-top:3px}
.mc .mv small{color:var(--dim); font-size:11px; font-weight:500}
.mc .mbar{height:5px; border-radius:4px; background:var(--bg); margin-top:7px; overflow:hidden}
.mc .mbar i{display:block; height:100%; border-radius:4px; transition:width .3s}
.mc.P .ml{color:#9db9f7}.mc.P .mbar i{background:var(--blu)}
.mc.F .ml{color:var(--amb)}.mc.F .mbar i{background:var(--amb)}
.mc.C .ml{color:#7cc79b}.mc.C .mbar i{background:var(--grn)}
.mc.over .mv{color:var(--red)}
.mc.over .mbar i{background:var(--red)}

.ticks{display:flex; gap:7px; margin:0 0 10px}
.tick{flex:1; border:1px solid var(--line); background:var(--card); color:var(--mut); border-radius:12px;
  padding:9px 4px 7px; cursor:pointer; text-align:center}
.tick .ti{font-size:17px; line-height:1}
.tick .tl{font-family:'Barlow Condensed',sans-serif; font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; margin-top:3px; font-weight:600}
.tick.on{border-color:var(--blu-line); background:var(--blu-soft); color:#c9d8fb}
.tick.wo{margin-left:6px}
.tick.wo.on{border-color:rgba(67,160,102,.5); background:var(--grn-soft); color:#a9d9bd}
.burn{display:flex; gap:8px; align-items:center; background:var(--card); border:1px solid rgba(67,160,102,.4);
  border-radius:12px; padding:10px 12px; margin:0 0 10px}
.burn .bl{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; flex:0 0 auto}
.burn input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--line); border-radius:9px; color:var(--ink);
  font-family:'IBM Plex Mono',monospace; font-size:16px; font-weight:600; padding:9px 8px; text-align:center; outline:none}
.burn button{border:none; border-radius:9px; padding:10px 13px; font-size:13.5px; font-weight:600; cursor:pointer}
.burn .bok{background:var(--grn); color:#fff}
.burn .bno{background:transparent; border:1px solid var(--line2); color:var(--mut)}

.sugg{border-left:3px solid var(--grn); background:var(--card); border-radius:0 var(--r) var(--r) 0;
  padding:11px 13px; margin:0 0 12px; font-size:13.5px; color:var(--mut)}
.sugg .st{font-family:'Barlow Condensed',sans-serif; font-size:16px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink); font-weight:600}
.sugg .sm{font-family:'IBM Plex Mono',monospace; font-size:12px; margin-top:5px; color:var(--ink); letter-spacing:.02em}
.sugg .sd{margin-top:6px; line-height:1.5}

.jtitle{font-family:'Barlow Condensed',sans-serif; font-size:21px; text-transform:uppercase; letter-spacing:.03em; margin:14px 0 8px; color:var(--mut)}
.entry{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:11px 12px; margin-bottom:8px; cursor:pointer}
.entry .et{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); flex:0 0 34px}
.entry .en{flex:1; min-width:0}
.entry .en .nn{font-weight:500; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.entry .en .gg{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); margin-top:1px}
.entry .ek{font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600; text-align:right}
.entry .ek small{display:block; font-size:9.5px; color:#9db9f7; font-weight:500; margin-top:1px}
.empty{text-align:center; color:var(--dim); padding:26px 10px; font-size:14.5px}

#addbtn{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:80; display:flex; align-items:center; gap:9px; background:var(--grn); color:#fff; border:none;
  border-radius:999px; padding:14px 26px; font-size:16px; font-weight:600; cursor:pointer;
  box-shadow:0 8px 28px rgba(0,0,0,.5)}
#addbtn:active{transform:translateX(-50%) scale(.97)}

.ov{position:fixed; inset:0; z-index:100; background:var(--bg); overflow-y:auto; display:none; -webkit-overflow-scrolling:touch}
.ov.open{display:block}
.ov .inner{max-width:560px; margin:0 auto; padding:14px 16px 120px}
.ovhead{display:flex; align-items:center; gap:10px; padding:6px 0 12px; position:sticky; top:0; background:var(--bg); z-index:5; padding-top:calc(6px + env(safe-area-inset-top))}
.ovhead .back{width:44px; height:44px; border-radius:50%; border:1px solid var(--line2); background:var(--card); color:var(--ink); font-size:18px; cursor:pointer; flex:0 0 auto}
.ovhead h2{font-family:'Barlow Condensed',sans-serif; font-size:26px; text-transform:uppercase; margin:0; letter-spacing:.02em; flex:1}

.search{width:100%; background:var(--card); border:1px solid var(--line); border-radius:12px; color:var(--ink);
  font-size:16px; padding:12px 14px; outline:none; margin-bottom:10px}
.search:focus-visible{border-color:var(--blu-line)}
.cats{display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--mut); border-radius:999px;
  padding:7px 13px; font-size:13.5px; cursor:pointer}
.cat.on{border-color:var(--blu-line); background:var(--blu-soft); color:#9db9f7; font-weight:600}
.sorts{display:flex; gap:6px; align-items:center; padding-bottom:8px; overflow-x:auto; scrollbar-width:none}
.sorts::-webkit-scrollbar{display:none}
.sorts .slab{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; flex:0 0 auto}
.sortb{flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--mut); border-radius:9px;
  padding:6px 11px; font-size:12.5px; cursor:pointer; font-family:'IBM Plex Mono',monospace}
.sortb.on{border-color:var(--blu-line); background:var(--blu-soft); color:var(--ink)}
.scanbtn{width:100%; border:1px dashed var(--blu-line); background:var(--blu-soft); color:#c9d8fb; border-radius:12px;
  padding:12px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:10px}
.offbtn{width:100%; border:1px dashed rgba(67,160,102,.5); background:var(--grn-soft); color:#a9d9bd; border-radius:12px;
  padding:12px; font-size:15px; font-weight:600; cursor:pointer; margin:8px 0 4px}
.seclab{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; margin:12px 0 7px}
.recents{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px}
.recents::-webkit-scrollbar{display:none}
.rc{flex:0 0 auto; border:1px dashed var(--line2); background:var(--card); color:var(--ink); border-radius:10px;
  padding:8px 12px; font-size:13.5px; cursor:pointer}
.rc.fav{border-color:rgba(217,164,65,.45); color:#ecd9ab}
.frow{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:11px 12px; margin-bottom:7px; cursor:pointer}
.frow .fn{flex:1; min-width:0}
.frow .fn .nn{font-weight:500; font-size:15px}
.frow .fn .mm{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); margin-top:2px; letter-spacing:.02em}
.frow .fpen{width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--card2); color:var(--dim); font-size:13px; cursor:pointer; flex:0 0 auto}
.frow.sel{border-color:var(--blu-line); background:var(--blu-soft)}
.newfood{width:100%; border:1px dashed var(--line2); background:transparent; color:var(--mut); border-radius:var(--r);
  padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:6px}

.pcard{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 14px; margin-top:4px}
.pcard h3{font-family:'Barlow Condensed',sans-serif; font-size:26px; text-transform:uppercase; margin:0; line-height:1.05}
.pcard .per{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); margin-top:6px; letter-spacing:.03em}
.pcard .hint{font-size:13px; color:var(--mut); margin-top:6px}
#scanbox{background:#000; border-radius:12px; overflow:hidden; min-height:220px; position:relative}
#scanbox video{width:100%; display:block; max-height:320px; object-fit:cover}
.scst{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mut); text-align:center; margin-top:10px; letter-spacing:.03em}
.umodes{display:flex; gap:7px; justify-content:center; margin-top:16px; flex-wrap:wrap}
.um{border:1px solid var(--line); background:var(--card2); color:var(--mut); border-radius:999px; padding:8px 15px;
  font-size:13.5px; cursor:pointer; font-weight:600}
.um.on{border-color:var(--grn); background:var(--grn-soft); color:#a9d9bd}
.gramctl{display:flex; align-items:center; justify-content:center; gap:14px; margin:16px 0 6px}
.gramctl .gb{width:52px; height:52px; border-radius:14px; border:1px solid var(--line2); background:var(--card2); color:var(--ink); font-size:22px; cursor:pointer}
.gramctl input{width:110px; background:var(--bg); border:1px solid var(--line); border-radius:12px; color:var(--ink);
  font-family:'IBM Plex Mono',monospace; font-size:28px; font-weight:600; padding:10px 6px; text-align:center; outline:none}
.gramctl input:focus-visible{border-color:var(--blu-line)}
.gramu{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); text-align:center; letter-spacing:.08em; text-transform:uppercase}
.qchips{display:flex; gap:7px; justify-content:center; margin:12px 0 4px; flex-wrap:wrap}
.qc{border:1px solid var(--line); background:var(--card2); color:var(--mut); border-radius:9px; padding:7px 12px;
  font-family:'IBM Plex Mono',monospace; font-size:13px; cursor:pointer}
.livem{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:7px; margin-top:14px}
.lm{background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:8px 4px; text-align:center}
.lm .v{font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600}
.lm .l{font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; margin-top:2px}
.lm.P .v{color:#9db9f7}.lm.F .v{color:var(--amb)}.lm.C .v{color:#7cc79b}
.pactions{display:flex; gap:9px; margin-top:16px}
.pbtn{flex:1; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:600; cursor:pointer}
.pbtn.add{background:var(--grn); color:#fff}
.pbtn.sec{background:var(--card2); border:1px solid var(--line2); color:var(--ink)}
.pbtn.del{background:transparent; border:1px solid rgba(217,106,90,.4); color:var(--red); flex:0 0 auto; padding:15px 18px}

.fields{display:flex; flex-direction:column; gap:12px; margin-top:8px}
.fields label{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; display:flex; flex-direction:column; gap:5px}
.fields input, .fields select{background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--ink);
  font-size:15px; padding:11px 12px; outline:none; width:100%; font-family:'Barlow',sans-serif; -webkit-appearance:none}
.fields input.mono{font-family:'IBM Plex Mono',monospace; font-weight:600}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.h2s{font-family:'Barlow Condensed',sans-serif; font-size:22px; text-transform:uppercase; margin:22px 0 6px; letter-spacing:.02em}
.savebar{display:flex; gap:9px; margin-top:14px}
.note{font-size:13px; color:var(--dim); line-height:1.5; margin-top:12px}
.note b{color:var(--mut)}
.wrow{display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--mut); padding:6px 2px; border-bottom:1px dashed var(--line)}
.avg{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink); margin-top:10px}
footer{margin-top:26px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase}
@media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>

<header class="top"><div class="wrap">
  <div class="brandrow">
    <div class="brand">
      <span class="eyebrow" id="eyebrow">Recomp</span>
      <h1>La <span>Table</span></h1>
    </div>
    <button class="docbtn" id="openSet">Profil</button>
  </div>
</div></header>

<div class="wrap">
  <div class="datenav">
    <button class="arrow" id="dprev">‹</button>
    <div class="dl" id="dlabel">Aujourd'hui<small>—</small></div>
    <button class="arrow" id="dnext">›</button>
  </div>
  <div class="gauges" id="gauges"></div>
  <div class="ticks" id="ticks"></div>
  <div id="burnbox"></div>
  <div id="suggbox"></div>
  <div class="jtitle">Journal</div>
  <div id="journal"></div>
  <footer>Sauvegarde automatique · v4 · Juillet 2026</footer>
</div>

<button id="addbtn">＋ Ajouter</button>

<div class="ov" id="pick"><div class="inner" id="pickin"></div></div>
<div class="ov" id="setov"><div class="inner" id="setin"></div></div>

const TARGETS_DEFAULT = {k:2050,p:143,f:50,c:257};
const PROFILE_DEFAULT = {name:'Milann', sx:'h', age:28, cm:176, kg:72, act:1.55, goal:-500};

/* ================= STOCKAGE ================= */
const mem = {};
const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); if(r && r.value!=null) return JSON.parse(r.value); return null; } }catch(e){}
    try{ const v = localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){}
    return (k in mem)? mem[k] : null;
  },
  async set(k,v){
    const s = JSON.stringify(v);
    try{ if(window.storage){ await window.storage.set(k,s); return; } }catch(e){}
    try{ localStorage.setItem(k,s); return; }catch(e){}
    mem[k]=v;
  },
  async list(prefix){
    try{ if(window.storage){ const r = await window.storage.list(prefix); if(r && r.keys) return r.keys; } }catch(e){}
    try{ return Object.keys(localStorage).filter(k=>k.startsWith(prefix)); }catch(e){}
    return Object.keys(mem).filter(k=>k.startsWith(prefix));
  }
};
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return iso(new Date()); }

/* ================= ÉTAT ================= */
let foods=null, targets=null, profile=null, recents=[], favs=[];
let viewDate = todayISO();
let day = [];
let tick = {b:0,l:0,d:0,w:0,wk:0};
let showBurn = false;
let pickCat='all', pickSearch='', pickSort=null;

async function migrateFoods(){
  const v = await store.get('lt_foodsv');
  if(v>=4) return;
  const byId = {};
  foods.forEach(f=>byId[f.id]=f);
  FOODS_DEFAULT.forEach(df=>{
    if(!byId[df.id]) foods.push(JSON.parse(JSON.stringify(df)));
    else{
      const mine = byId[df.id];
      if(mine.cat !== df.cat) mine.cat = df.cat;
      if(df.un) mine.un = JSON.parse(JSON.stringify(df.un));
    }
  });
  await saveFoods();
  await store.set('lt_foodsv', 4);
}
async function loadDayData(){
  day = (await store.get('lt_day_'+viewDate)) || [];
  tick = Object.assign({b:0,l:0,d:0,w:0,wk:0}, (await store.get('lt_tick_'+viewDate))||{});
  showBurn = false;
}
async function loadAll(){
  foods = await store.get('lt_foods');
  if(!foods){ foods = JSON.parse(JSON.stringify(FOODS_DEFAULT)); await store.set('lt_foods', foods); await store.set('lt_foodsv', 4); }
  else await migrateFoods();
  targets = (await store.get('lt_targets')) || {...TARGETS_DEFAULT};
  profile = Object.assign({}, PROFILE_DEFAULT, (await store.get('lt_profile'))||{});
  recents = (await store.get('lt_recent')) || [];
  favs = (await store.get('lt_favs')) || [];
  await loadDayData();
}
async function saveDay(){ await store.set('lt_day_'+viewDate, day); }
async function saveTick(){ await store.set('lt_tick_'+viewDate, tick); }
async function saveFoods(){ await store.set('lt_foods', foods); }
async function saveFavs(){ await store.set('lt_favs', favs); }

}
function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }
function nowHM(){ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
function totals(){
  const t = {k:0,p:0,f:0,c:0};
  day.forEach(e=>{ const r=e.g/100; t.k+=e.u.k*r; t.p+=e.u.p*r; t.f+=e.u.f*r; t.c+=e.u.c*r; });
  return t;
}
function effTargets(){
  const burn = tick.wk||0;
  return {k:targets.k+burn, p:targets.p, f:targets.f, c:targets.c+Math.round(burn/4), burn:burn};
}
function pct(v,t){ return Math.min(100, Math.round(v/t*100)); }
function qLabel(q){ return (Math.round(q*100)/100)+''; }

/* ================= JAUGES ================= */
function renderGauges(){
  const t = totals();
  const T = effTargets();
  const kOver = t.k > T.k*1.03;
  const left = Math.round(T.k - t.k);
  document.getElementById('gauges').innerHTML =
   '<div class="kcalrow"><span class="big"'+(kOver?' style="color:var(--red)"':'')+'>'+Math.round(t.k)+'</span><span class="of">/ '+T.k+'</span><span class="u">kcal</span></div>'+
   '<div class="kbar"><i style="width:'+pct(t.k,T.k)+'%'+(kOver?';background:var(--red)':'')+'"></i></div>'+
   '<div class="kleft">'+(left>=0? "reste "+left+" kcal" : "dépassement +"+(-left)+" kcal")+(T.burn? ' · budget +'+T.burn+' (workout, reversé en glucides)':'')+'</div>'+
   '<div class="macros">'+mc('P','Protéines',t.p,T.p)+mc('F','Lipides',t.f,T.f)+mc('C','Glucides',t.c,T.c)+'</div>';
  renderNext(t);
}
function mc(cls,label,v,t){
  const over = v > t*1.06;
  return '<div class="mc '+cls+(over?' over':'')+'"><div class="ml">'+label+'</div>'+
   '<div class="mv">'+Math.round(v)+' <small>/ '+t+' g</small></div>'+
   '<div class="mbar"><i style="width:'+pct(v,t)+'%"></i></div></div>';
}

/* ================= SUGGESTION « PROCHAIN REPAS » ================= */
const SLOTNAMES = {b:"Petit-déjeuner", l:"Déjeuner", w:"Autour du workout", d:"Dîner", c:"Collation du soir"};
function suggCard(title, macroHTML, dish){
  return '<div class="sugg"><div class="st">'+title+'</div>'+
   (macroHTML? '<div class="sm">'+macroHTML+'</div>':'')+
   (dish? '<div class="sd">'+dish+'</div>':'')+'</div>';
}
function dishFor(slot, S){
  if(slot==='b'){
    const av = clamp(Math.round((S.c-30)/0.58/10)*10, 40, 110);
    const fb = clamp(Math.round((S.p - av*0.13 - 1.1)/0.08/25)*25, 100, 300);
    return "≈ "+av+" g d'avoine + "+fb+" g de fromage blanc 0 % + 1 banane + un filet de miel";
  }
  if(slot==='l'){
    const pr = clamp(Math.round(S.p/0.24/10)*10, 100, 280);
    const rz = clamp(Math.round(S.c*0.85/0.28/10)*10, 100, 400);
    return "sers-toi ≈ "+pr+" g de la protéine du plat + "+rz+" g de riz cuit (ou l'équivalent en patate douce ×1,6) + légumes à volonté";
  }
  if(slot==='w'){
    if(S.p>=12) return "1 banane avant la séance · 1 scoop de whey ou 150 g de fromage blanc après";
    return "1 banane avant la séance"+(S.c>40? " + un filet de miel":"");
  }
  if(slot==='d'){
    const pr = clamp(Math.round(S.p/0.25/10)*10, 80, 250);
    const rz = clamp(Math.round(S.c*0.8/0.28/10)*10, 0, 350);
    const fr = clamp(Math.round((S.f-6)/0.32/5)*5, 0, 50);
    let s = "≈ "+pr+" g de protéine maigre (thon, reste de poulet, jambon)"+(rz>=80? " + "+rz+" g de riz cuit":"")+" + salade";
    s += fr>=15? ", et "+fr+" g de fromage rentrent dans ton budget gras" : " — fromage : passe ton tour ce soir, budget gras plein";
    return s;
  }
  return "fromage blanc 0 % + framboises + un filet de miel, et au lit";
}
function renderNext(t){
  const box = document.getElementById('suggbox');
  if(viewDate !== todayISO()){ box.innerHTML=''; return; }
  const T = effTargets();
  const R = {k:T.k-t.k, p:T.p-t.p, f:T.f-t.f, c:T.c-t.c};
  const now = new Date(); const h = now.getHours() + now.getMinutes()/60;
  const q = [];
  if(!tick.b && h<11) q.push('b');
  if(!tick.l && h<16) q.push('l');
  if(!tick.w) q.push('w');
  if(!tick.d) q.push('d');
  let slot = null;
  if(q.includes('b')) slot='b';
  else if(q.includes('l')) slot='l';
  else if(q.includes('w') && (tick.l || h>=14)) slot='w';
  else if(q.includes('d')) slot='d';
  else if(R.k>150) slot='c';

  if(!slot){
    box.innerHTML = R.k < -120
      ? suggCard("Journée bouclée", null, "Dépassement de "+Math.round(-R.k)+" kcal — pas de drame, c'est la moyenne de la semaine qui commande. Demain, journée normale.")
      : suggCard("Journée bouclée", null, "Tout est coché, budget plein. La suite se joue au sommeil.");
    return;
  }
  if(R.k < 120 && slot!=='c'){
    box.innerHTML = suggCard("Budget presque plein", null, "Il reste ~"+Math.max(0,Math.round(R.k))+" kcal. Reste léger : salade + protéine maigre (thon, jambon, fromage blanc 0 %).");
    return;
  }
  const W = {b:.22, l:.34, w:.12, d:.32};
  const sum = q.reduce((a,s)=>a+W[s],0) || 1;
  const share = slot==='c' ? 1 : Math.min(1, W[slot]/sum);
  const r5 = v=>Math.max(0, Math.round(v/5)*5);
  const S = {k:Math.round(R.k*share/10)*10, p:r5(R.p*share), f:r5(Math.max(0,R.f)*share), c:r5(Math.max(0,R.c)*share)};
  const macroHTML = "vise ≈ "+S.k+" kcal · <span class=\"iP\">P</span> "+S.p+" · <span class=\"iF\">L</span> "+S.f+" · <span class=\"iC\">G</span> "+S.c;
  box.innerHTML = suggCard("Prochain : "+SLOTNAMES[slot], macroHTML, dishFor(slot,S));
}

/* ================= SCAN CODE-BARRES ================= */
let scanStream=null, scanRAF=null, scanH5=null;
function scst(msg){ const e=document.getElementById('scst'); if(e) e.textContent = msg; }
function stopScan(){
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF=null; }
  if(scanStream){ try{ scanStream.getTracks().forEach(t=>t.stop()); }catch(e){} scanStream=null; }
  if(scanH5){ try{ scanH5.stop().catch(()=>{}); }catch(e){} scanH5=null; }
}
function scanView(){
  stopScan();
  let s = '<div class="ovhead"><button class="back" id="scback">‹</button><h2>Scanner</h2></div>';
  s += '<div class="pcard"><div id="scanbox"><video id="scanvid" playsinline muted></video></div>';
  s += '<div class="scst" id="scst">Autorise la caméra…</div>';
  s += '<div class="fields" style="margin-top:14px"><label>Ou tape le code-barres<input class="mono" type="number" inputmode="numeric" id="sc-code" placeholder="ex. 3017620422003"></label></div>';
  s += '<button class="pbtn add" id="sc-go" style="margin-top:10px;width:100%">Chercher ce code</button></div>';
  pickin.innerHTML = s; pick.scrollTop=0;
  document.getElementById('scback').onclick = ()=>{ stopScan(); renderPicker(); };

    const c = document.getElementById('sc-code').value.trim();
    if(c){ stopScan(); onCode(c); }
  };
  startScan();
}
async function startScan(){
  try{
    if('BarcodeDetector' in window){
      const fmts = await BarcodeDetector.getSupportedFormats();
      if(fmts.includes('ean_13')){ nativeScan(); return; }
    }
  }catch(e){}
  libScan();
}
async function nativeScan(){
  const vid = document.getElementById('scanvid');
  if(!vid) return;
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}, audio:false});
    vid.srcObject = scanStream;
    await vid.play();
    scst("Vise le code-barres");
    const det = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128']});
    const loop = async ()=>{
      if(!document.getElementById('scanvid') || !scanStream) return;
      try{
        const codes = await det.detect(vid);
        if(codes && codes.length){ const c = codes[0].rawValue; stopScan(); onCode(c); return; }
      }catch(e){}
      scanRAF = requestAnimationFrame(loop);
    };
    loop();
  }catch(e){ scst("Caméra refusée ou indisponible — utilise la saisie manuelle en bas."); }
}
function loadScanLib(){
  return new Promise((res,rej)=>{
    if(window.Html5Qrcode) return res();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}
async function libScan(){
  scst("Chargement du module caméra…");
  try{ await loadScanLib(); }catch(e){ scst("Module caméra indisponible (hors ligne ?) — saisie manuelle en bas."); return; }
  const box = document.getElementById('scanbox'); if(!box) return;
  box.innerHTML = '<div id="h5box"></div>';
  try{
    scanH5 = new Html5Qrcode('h5box');
    const F = Html5QrcodeSupportedFormats;
    await scanH5.start(
      {facingMode:'environment'},
      {fps:8, qrbox:{width:260,height:140}, formatsToSupport:[F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.CODE_128]},
      (txt)=>{ stopScan(); onCode(txt); },
      ()=>{}
    );
    scst("Vise le code-barres");
  }catch(e){ scst("Caméra refusée — utilise la saisie manuelle en bas."); }
}
function offPrefill(p, code){
  const n = p.nutriments||{};
  const kk = n['energy-kcal_100g']!=null ? Math.round(n['energy-kcal_100g']) : (n['energy_100g']!=null ? Math.round(n['energy_100g']/4.184) : '');
  const r1 = v => v!=null ? Math.round(v*10)/10 : '';

/* ================= PORTION (grammes ⇄ unités) ================= */
function livemHTML(f,g){
  const r=g/100;
  return '<div class="lm"><div class="v">'+Math.round(f.k*r)+'</div><div class="l">kcal</div></div>'+
   '<div class="lm P"><div class="v">'+(f.p*r).toFixed(1).replace('.0','')+'</div><div class="l">Prot.</div></div>'+
   '<div class="lm F"><div class="v">'+(f.f*r).toFixed(1).replace('.0','')+'</div><div class="l">Lip.</div></div>'+
   '<div class="lm C"><div class="v">'+(f.c*r).toFixed(1).replace('.0','')+'</div><div class="l">Gluc.</div></div>';
}
/* init = {mode:'g'|'u', g, q, ui} — ui = index dans f.un */
function portionView(f, init, editIdx, extraUnit){
  const units = (f.un && f.un.length)? f.un.slice() : [];
  if(extraUnit && !units.some(u=>u[0]===extraUnit[0])) units.unshift(extraUnit);
  let mode = init.mode, ui = init.ui||0, val = mode==='u' ? (init.q||1) : (init.g||100);

  function draw(){
    const uG = units[ui]? units[ui][1] : 0;
    const grams = mode==='u' ? Math.round(val*uG) : Math.max(0, val);
    let s = '<div class="ovhead"><button class="back" id="pback">‹</button><h2>'+(editIdx!=null?'Modifier':'Portion')+'</h2></div>';
    s += '<div class="pcard"><h3>'+f.n+'</h3>'+
     '<div class="per">'+macroLine(f)+' — pour 100 g</div>'+
     (f.hint? '<div class="hint">'+f.hint+'</div>':'');
    if(units.length){
      s += '<div class="umodes"><button class="um'+(mode==='g'?' on':'')+'" data-m="g">grammes</button>'+
        units.map((u,i)=>'<button class="um'+(mode==='u'&&ui===i?' on':'')+'" data-m="u" data-i="'+i+'">'+u[0]+'</button>').join('')+'</div>';
    }
    s += '<div class="gramctl"><button class="gb" id="gminus">−</button><input type="number" inputmode="decimal" id="gin" value="'+val+'"><button class="gb" id="gplus">＋</button></div>';
    s += '<div class="gramu" id="gramu">'+(mode==='u'? units[ui][0]+' · = '+grams+' g' : 'grammes')+'</div>';
    const chips = mode==='u' ? [0.5,1,1.5,2,3] : [30,50,100,150,200,250];
    s += '<div class="qchips">'+chips.map(q=>'<button class="qc" data-q="'+q+'">'+q+'</button>').join('')+'</div>';
    s += '<div class="livem" id="livem">'+livemHTML(f,grams)+'</div>';
    s += '<div class="pactions">'+(editIdx!=null? '<button class="pbtn del" id="pdel">Suppr.</button>':'')+
     '<button class="pbtn add" id="padd">'+(editIdx!=null? 'Enregistrer':'Ajouter au journal')+'</button></div></div>';
    pickin.innerHTML = s;
    pick.scrollTop = 0;
    wire();
  }
  function grams(){
    return mode==='u' ? Math.round(val * units[ui][1]) : Math.max(0, Math.round(val));
  }
  function upd(){
    const g = grams();
    document.getElementById('livem').innerHTML = livemHTML(f, g);
    document.getElementById('gramu').textContent = mode==='u' ? units[ui][0]+' · = '+g+' g' : 'grammes';
  }
  function wire(){
    const gin = document.getElementById('gin');
    gin.addEventListener('input', ()=>{ val = parseFloat(gin.value)||0; upd(); });
    document.getElementById('gminus').onclick = ()=>{ const st = mode==='u'?1:10; val = Math.max(0, (parseFloat(gin.value)||0)-st); gin.value = val; upd(); };
    document.getElementById('gplus').onclick = ()=>{ const st = mode==='u'?1:10; val = (parseFloat(gin.value)||0)+st; gin.value = val; upd(); };
    pickin.querySelectorAll('.qc').forEach(b=> b.onclick = ()=>{ val = parseFloat(b.dataset.q); gin.value = val; upd(); });
    pickin.querySelectorAll('.um').forEach(b=> b.onclick = ()=>{
      const g = grams();
      if(b.dataset.m==='g'){ mode='g'; val = g; }
      else { mode='u'; ui = +b.dataset.i; val = Math.round((g / units[ui][1])*100)/100 || 1; }
      draw();
    });
    document.getElementById('pback').onclick = ()=>{ if(editIdx!=null){ pick.classList.remove('open'); } else renderPicker(); };
    document.getElementById('padd').onclick = async ()=>{
      const g = Math.max(1, grams());
      const q = mode==='u' ? Math.round(val*100)/100 : null;
      const ul = mode==='u' ? units[ui][0] : null;
      if(editIdx!=null){
        day[editIdx].g = g;
        day[editIdx].q = q; day[editIdx].ul = ul;
        if(!ul){ delete day[editIdx].q; delete day[editIdx].ul; }
      }else{
        const ent = {n:f.n, g:g, t:nowHM(), u:{k:f.k,p:f.p,f:f.f,c:f.c}, fid:f.id};
        if(ul){ ent.q = q; ent.ul = ul; }
        day.push(ent);
        recents = [f.id, ...recents.filter(x=>x!==f.id)].slice(0,10);
        await store.set('lt_recent', recents);
      }
      await saveDay();
      pick.classList.remove('open');
      renderAll();
    };
    const del = document.getElementById('pdel');
    if(del) del.onclick = async ()=>{
      day.splice(editIdx,1); await saveDay();
      pick.classList.remove('open'); renderAll();
    };
  }
  draw();
}
function openPortion(fid){
  const f = foods.find(x=>x.id===fid); if(!f) return;
  const last = [...day].reverse().find(e=>e.fid===fid);
  let init;
  if(last && last.ul && f.un){
    const i = f.un.findIndex(u=>u[0]===last.ul);
    init = i>=0 ? {mode:'u', ui:i, q:last.q} : {mode:'g', g:last.g};
  }else if(last){
    init = {mode:'g', g:last.g};
  }else{
    init = (f.un && f.un.length)? {mode:'u', ui:0, q:1} : {mode:'g', g:100};
  }
  portionView(f, init, null);
}
function openPortionForEntry(i){
  const e = day[i];
  const base = foods.find(x=>x.id===e.fid);
  const f = {id:e.fid, n:e.n, k:e.u.k, p:e.u.p, f:e.u.f, c:e.u.c, hint:(base||{}).hint, un:(base||{}).un};
  let init, extra = null;
  if(e.ul){
    const uG = Math.round((e.g/e.q)*100)/100;
    extra = [e.ul, uG];
    init = {mode:'u', ui:0, q:e.q};
    if(f.un){
      const idx = f.un.findIndex(u=>u[0]===e.ul);
      if(idx>=0){ extra = null; init = {mode:'u', ui:idx, q:e.q}; }
    }
  }else{
    init = {mode:'g', g:e.g};
  }
  portionView(f, init, i, extra);
  pick.classList.add('open'); pick.scrollTop=0;
}

/* ================= PROFIL & CIBLES ================= */
const setov = document.getElementById('setov'), setin = document.getElementById('setin');
function computeTargets(pr){
  const bmr = 10*pr.kg + 6.25*pr.cm - 5*pr.age + (pr.sx==='h'? 5 : -161);
  const k = Math.max(1200, Math.round((bmr*pr.act + pr.goal)/10)*10);
  const p = Math.round(pr.kg*1.98);
  const f = Math.round(pr.kg*0.66);
  const c = Math.max(0, Math.round((k - p*4 - f*9)/4));
  return {k,p,f,c};
}
function readProfileFields(){
  return {
    name: document.getElementById('pf-name').value.trim() || 'Profil',
    sx: document.getElementById('pf-sx').value,
    age: clamp(parseInt(document.getElementById('pf-age').value)||28, 10, 100),
    cm: clamp(parseInt(document.getElementById('pf-cm').value)||176, 120, 230),
    kg: clamp(parseFloat(document.getElementById('pf-kg').value)||72, 30, 250),
    act: parseFloat(document.getElementById('pf-act').value)||1.55,
    goal: parseInt(document.getElementById('pf-goal').value)||0
  };
}
async function exportAll(){
  const keys = await store.list('lt_');
  const out = {};
  for(const k of keys){ out[k] = await store.get(k); }
  const blob = new Blob([JSON.stringify(out)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'la-table-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
}

      if(!keys.length){ alert("Ce fichier ne ressemble pas à un backup La Table."); return; }
      if(!confirm("Restaurer ce backup ? Les données actuelles seront remplacées par celles du fichier.")) return;
      for(const k of keys){ await store.set(k, obj[k]); }
      await loadAll();
      setov.classList.remove('open');
      renderAll();
      alert("Backup restauré ✓");
    }catch(e){ alert("Fichier illisible."); }
  });
  document.getElementById('t-reset').onclick = async ()=>{
    if(confirm("Restaurer la base d'aliments par défaut ? Tes aliments créés et tes modifications seront perdus (le journal, lui, est conservé).")){
      foods = JSON.parse(JSON.stringify(FOODS_DEFAULT));
      await saveFoods(); await store.set('lt_foodsv', 4);
      setov.classList.remove('open');
    }
  };
}

/* ================= INIT ================= */
document.getElementById('addbtn').onclick = openPicker;
document.getElementById('openSet').onclick = openSettings;
document.getElementById('dprev').onclick = ()=> shiftDay(-1);
document.getElementById('dnext').onclick = ()=> shiftDay(1);

if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

(async function init(){
  await loadAll();
  renderAll();
})();
</script>
