<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17191d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Table">
<link rel="apple-touch-icon" href="table-icon.png">
<title>La Table — Recomp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#17191d; --card:#1f2227; --card2:#262a31; --line:#30343c; --line2:#3a3f48;
  --ink:#ece9e1; --mut:#9a9ea6; --dim:#6c7078;
  --blu:#4a7df0; --blu-soft:rgba(74,125,240,.14); --blu-line:rgba(74,125,240,.45);
  --grn:#43a066; --grn-soft:rgba(67,160,102,.14);
  --amb:#d9a441; --amb-soft:rgba(217,164,65,.12);
  --red:#d96a5a;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; background:var(--bg); color:var(--ink); font-family:'Barlow',system-ui,sans-serif; font-size:16px; line-height:1.45; padding-bottom:110px}
.wrap{max-width:520px; margin:0 auto; padding:0 14px}
button{font-family:inherit}

/* ---------- Header ---------- */
header.top{position:sticky; top:0; z-index:50; background:linear-gradient(var(--bg) 82%, rgba(23,25,29,0)); padding-top:env(safe-area-inset-top)}
.brandrow{display:flex; align-items:center; justify-content:space-between; padding:14px 2px 10px}
.brand .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase}
.brand h1{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:30px; letter-spacing:.02em; margin:0; line-height:1; text-transform:uppercase}
.brand h1 span{color:var(--grn)}
.docbtn{border:1px solid var(--line2); background:var(--card); color:var(--ink);
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:15px; letter-spacing:.05em;
  padding:9px 14px; border-radius:999px; cursor:pointer; text-transform:uppercase}
.docbtn:active{transform:scale(.97)}

/* ---------- Date nav ---------- */
.datenav{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:2px 0 12px}
.datenav .arrow{width:40px; height:36px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--mut); font-size:17px; cursor:pointer}
.datenav .dl{font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:19px; text-transform:uppercase; letter-spacing:.04em; text-align:center; flex:1}
.datenav .dl small{display:block; font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--dim); letter-spacing:.1em; margin-top:1px}

/* ---------- Jauges ---------- */
.gauges{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 14px 14px; margin-bottom:12px}
.kcalrow{display:flex; align-items:baseline; gap:8px; justify-content:center}
.kcalrow .big{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:34px; letter-spacing:-.01em}
.kcalrow .of{font-family:'IBM Plex Mono',monospace; font-size:15px; color:var(--dim)}
.kcalrow .u{font-family:'Barlow Condensed',sans-serif; font-size:14px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em}
.kbar{height:8px; border-radius:5px; background:var(--bg); border:1px solid var(--line); margin:11px 2px 4px; overflow:hidden}
.kbar i{display:block; height:100%; background:var(--ink); border-radius:5px; transition:width .3s}
.kleft{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); text-align:center; letter-spacing:.04em}
.macros{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:13px}
.mc{background:var(--card2); border:1px solid var(--line); border-radius:11px; padding:9px 9px 8px; text-align:center}
.mc .ml{font-family:'Barlow Condensed',sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:.08em; font-weight:600}
.mc .mv{font-family:'IBM Plex Mono',monospace; font-size:14.5px; font-weight:600; margin-top:3px}
.mc .mv small{color:var(--dim); font-size:11px; font-weight:500}
.mc .mbar{height:5px; border-radius:4px; background:var(--bg); margin-top:7px; overflow:hidden}
.mc .mbar i{display:block; height:100%; border-radius:4px; transition:width .3s}
.mc.P .ml{color:#9db9f7}.mc.P .mbar i{background:var(--blu)}
.mc.F .ml{color:var(--amb)}.mc.F .mbar i{background:var(--amb)}
.mc.C .ml{color:#7cc79b}.mc.C .mbar i{background:var(--grn)}
.mc.over .mv{color:var(--red)}
.mc.over .mbar i{background:var(--red)}

/* ---------- Suggestions ---------- */
.sugg{border-left:3px solid var(--grn); background:var(--card); border-radius:0 var(--r) var(--r) 0;
  padding:10px 12px; margin:0 0 12px; font-size:13.5px; color:var(--mut)}
.sugg b{color:var(--ink)}
.sugg .sline{display:flex; justify-content:space-between; gap:10px; padding:4px 0}
.sugg .sm{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); white-space:nowrap}

/* ---------- Journal ---------- */
.jtitle{font-family:'Barlow Condensed',sans-serif; font-size:21px; text-transform:uppercase; letter-spacing:.03em; margin:16px 0 8px; color:var(--mut)}
.entry{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:11px 12px; margin-bottom:8px; cursor:pointer}
.entry .et{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); flex:0 0 34px}
.entry .en{flex:1; min-width:0}
.entry .en .nn{font-weight:500; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.entry .en .gg{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); margin-top:1px}
.entry .ek{font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600; text-align:right}
.entry .ek small{display:block; font-size:9.5px; color:#9db9f7; font-weight:500; margin-top:1px}
.empty{text-align:center; color:var(--dim); padding:26px 10px; font-size:14.5px}

/* ---------- Bouton ajouter ---------- */
#addbtn{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:80; display:flex; align-items:center; gap:9px; background:var(--grn); color:#fff; border:none;
  border-radius:999px; padding:14px 26px; font-size:16px; font-weight:600; cursor:pointer;
  box-shadow:0 8px 28px rgba(0,0,0,.5)}
#addbtn:active{transform:translateX(-50%) scale(.97)}

/* ---------- Overlays ---------- */
.ov{position:fixed; inset:0; z-index:100; background:var(--bg); overflow-y:auto; display:none; -webkit-overflow-scrolling:touch}
.ov.open{display:block}
.ov .inner{max-width:560px; margin:0 auto; padding:14px 16px 120px}
.ovhead{display:flex; align-items:center; gap:10px; padding:6px 0 12px; position:sticky; top:0; background:var(--bg); z-index:5; padding-top:calc(6px + env(safe-area-inset-top))}
.ovhead .back{width:44px; height:44px; border-radius:50%; border:1px solid var(--line2); background:var(--card); color:var(--ink); font-size:18px; cursor:pointer; flex:0 0 auto}
.ovhead h2{font-family:'Barlow Condensed',sans-serif; font-size:26px; text-transform:uppercase; margin:0; letter-spacing:.02em; flex:1}

/* picker */
.search{width:100%; background:var(--card); border:1px solid var(--line); border-radius:12px; color:var(--ink);
  font-size:16px; padding:12px 14px; outline:none; margin-bottom:10px}
.search:focus-visible{border-color:var(--blu-line)}
.cats{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--mut); border-radius:999px;
  padding:7px 13px; font-size:13.5px; cursor:pointer}
.cat.on{border-color:var(--blu-line); background:var(--blu-soft); color:#9db9f7; font-weight:600}
.seclab{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; margin:12px 0 7px}
.recents{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px}
.recents::-webkit-scrollbar{display:none}
.rc{flex:0 0 auto; border:1px dashed var(--line2); background:var(--card); color:var(--ink); border-radius:10px;
  padding:8px 12px; font-size:13.5px; cursor:pointer}
.frow{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:11px 12px; margin-bottom:7px; cursor:pointer}
.frow .fn{flex:1; min-width:0}
.frow .fn .nn{font-weight:500; font-size:15px}
.frow .fn .mm{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); margin-top:2px; letter-spacing:.02em}
.frow .fpen{width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--card2); color:var(--dim); font-size:13px; cursor:pointer; flex:0 0 auto}
.newfood{width:100%; border:1px dashed var(--line2); background:transparent; color:var(--mut); border-radius:var(--r);
  padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:6px}

/* portion */
.pcard{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 14px; margin-top:4px}
.pcard h3{font-family:'Barlow Condensed',sans-serif; font-size:26px; text-transform:uppercase; margin:0; line-height:1.05}
.pcard .per{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--dim); margin-top:6px; letter-spacing:.03em}
.pcard .hint{font-size:13px; color:var(--mut); margin-top:6px}
.gramctl{display:flex; align-items:center; justify-content:center; gap:14px; margin:18px 0 6px}
.gramctl .gb{width:52px; height:52px; border-radius:14px; border:1px solid var(--line2); background:var(--card2); color:var(--ink); font-size:22px; cursor:pointer}
.gramctl input{width:110px; background:var(--bg); border:1px solid var(--line); border-radius:12px; color:var(--ink);
  font-family:'IBM Plex Mono',monospace; font-size:28px; font-weight:600; padding:10px 6px; text-align:center; outline:none}
.gramctl input:focus-visible{border-color:var(--blu-line)}
.gramu{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--dim); text-align:center; letter-spacing:.08em; text-transform:uppercase}
.qchips{display:flex; gap:7px; justify-content:center; margin:12px 0 4px; flex-wrap:wrap}
.qc{border:1px solid var(--line); background:var(--card2); color:var(--mut); border-radius:9px; padding:7px 12px;
  font-family:'IBM Plex Mono',monospace; font-size:13px; cursor:pointer}
.livem{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:7px; margin-top:14px}
.lm{background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:8px 4px; text-align:center}
.lm .v{font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600}
.lm .l{font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; margin-top:2px}
.lm.P .v{color:#9db9f7}.lm.F .v{color:var(--amb)}.lm.C .v{color:#7cc79b}
.pactions{display:flex; gap:9px; margin-top:16px}
.pbtn{flex:1; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:600; cursor:pointer}
.pbtn.add{background:var(--grn); color:#fff}
.pbtn.del{background:transparent; border:1px solid rgba(217,106,90,.4); color:var(--red); flex:0 0 auto; padding:15px 18px}

/* éditeur d'aliment + réglages */
.fields{display:flex; flex-direction:column; gap:12px; margin-top:8px}
.fields label{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; display:flex; flex-direction:column; gap:5px}
.fields input, .fields select{background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--ink);
  font-size:15px; padding:11px 12px; outline:none; width:100%; font-family:'Barlow',sans-serif}
.fields input.mono{font-family:'IBM Plex Mono',monospace; font-weight:600}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.savebar{display:flex; gap:9px; margin-top:18px}
.note{font-size:13px; color:var(--dim); line-height:1.5; margin-top:14px}
.wrow{display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--mut); padding:6px 2px; border-bottom:1px dashed var(--line)}
.avg{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink); margin-top:10px}
footer{margin-top:26px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase}
@media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>

    <button class="docbtn" id="openSet">Cibles</button>

<div class="ov" id="pick"><div class="inner" id="pickin"></div></div>

<div class="ov" id="setov"><div class="inner" id="setin"></div></div>

const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); if(r && r.value!=null) return JSON.parse(r.value); return null; } }catch(e){}
    try{ const v = localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){}
    return (k in mem)? mem[k] : null;
  },
  async set(k,v){
    const s = JSON.stringify(v);
    try{ if(window.storage){ await window.storage.set(k,s); return; } }catch(e){}
    try{ localStorage.setItem(k,s); return; }catch(e){}
    mem[k]=v;
  }
};
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return iso(new Date()); }

/* ================= ÉTAT ================= */
let foods = null, targets = null, recents = [];
let viewDate = todayISO();
let day = []; // entrées du jour affiché
let pickCat = 'all', pickSearch = '';

async function loadAll(){
  foods = await store.get('lt_foods');
  if(!foods){ foods = JSON.parse(JSON.stringify(FOODS_DEFAULT)); await store.set('lt_foods', foods); }
  targets = (await store.get('lt_targets')) || {...TARGETS_DEFAULT};
  recents = (await store.get('lt_recent')) || [];
  day = (await store.get('lt_day_'+viewDate)) || [];
}
async function saveDay(){ await store.set('lt_day_'+viewDate, day); }
async function saveFoods(){ await store.set('lt_foods', foods); }

/* ================= JAUGES + JOURNAL ================= */
function totals(){
  const t = {k:0,p:0,f:0,c:0};
  day.forEach(e=>{ const r = e.g/100; t.k+=e.u.k*r; t.p+=e.u.p*r; t.f+=e.u.f*r; t.c+=e.u.c*r; });
  return t;
}
function pct(v,t){ return Math.min(100, Math.round(v/t*100)); }

function renderGauges(){
  const t = totals();
  const kOver = t.k > targets.k*1.03;
  const left = Math.round(targets.k - t.k);
  document.getElementById('gauges').innerHTML =
   '<div class="kcalrow"><span class="big"'+(kOver?' style="color:var(--red)"':'')+'>'+Math.round(t.k)+'</span><span class="of">/ '+targets.k+'</span><span class="u">kcal</span></div>'+
   '<div class="kbar"><i style="width:'+pct(t.k,targets.k)+'%'+(kOver?';background:var(--red)':'')+'"></i></div>'+
   '<div class="kleft">'+(left>=0? "reste "+left+" kcal" : "dépassement +"+(-left)+" kcal")+'</div>'+
   '<div class="macros">'+mc('P','Protéines',t.p,targets.p)+mc('F','Lipides',t.f,targets.f)+mc('C','Glucides',t.c,targets.c)+'</div>';
  renderSugg(t);
}
function mc(cls,label,v,t){
  const over = v > t*1.06;
  return '<div class="mc '+cls+(over?' over':'')+'"><div class="ml">'+label+'</div>'+
   '<div class="mv">'+Math.round(v)+' <small>/ '+t+' g</small></div>'+
   '<div class="mbar"><i style="width:'+pct(v,t)+'%"></i></div></div>';
}

/* Suggestions de comblement */
const SUGG = [
 {n:"Thon (1 boîte égouttée)", g:"+28 g P · 123 kcal", p:28,f:1,c:0,k:123, kind:'p', lean:true},
 {n:"Fromage blanc 0% (250 g)", g:"+20 g P · 120 kcal", p:20,f:0.5,c:10,k:120, kind:'p', lean:true},
 {n:"Jambon cuit (3 tranches)", g:"+18 g P · 100 kcal", p:18,f:2.7,c:1,k:100, kind:'p', lean:true},
 {n:"Whey (1 scoop 15 g)", g:"+12 g P · 60 kcal", p:12.5,f:0.8,c:1,k:60, kind:'p', lean:true},
 {n:"2 œufs", g:"+14 g P · 160 kcal", p:14,f:11,c:1,k:160, kind:'p'},
 {n:"Sardines (1 boîte)", g:"+22 g P · 180 kcal", p:22,f:11,c:0,k:180, kind:'p'},
 {n:"Riz basmati cuit (200 g)", g:"+56 g C · 260 kcal", p:6,f:1,c:56,k:260, kind:'c'},
 {n:"Patate douce (250 g)", g:"+43 g C · 195 kcal", p:3.5,f:0,c:43,k:195, kind:'c'},
 {n:"Flocons d'avoine (60 g)", g:"+35 g C · 8 g P · 220 kcal", p:8,f:4,c:35,k:222, kind:'c'},
 {n:"Banane", g:"+24 g C · 110 kcal", p:1.3,f:0.4,c:24,k:110, kind:'c'}
];
function renderSugg(t){
  const box = document.getElementById('suggbox');
  const rK = targets.k - t.k, rP = targets.p - t.p, rF = targets.f - t.f, rC = targets.c - t.c;
  if(t.k < targets.k*0.35 || rK < 90 || (rP<12 && rC<35)){ box.innerHTML=''; return; }
  let picks = [];
  if(rP >= 12){
    let pool = SUGG.filter(s=>s.kind==='p' && s.k <= rK+80);
    if(rF < 10) pool = pool.filter(s=>s.lean);
    picks.push(...pool.slice(0,2));
  }
  if(rC >= 35){
    const pool = SUGG.filter(s=>s.kind==='c' && s.k <= rK+80);
    if(pool.length) picks.push(pool[0]);
  }
  if(!picks.length){ box.innerHTML=''; return; }
  box.innerHTML = '<div class="sugg"><b>Pour combler :</b>'+
    picks.map(s=>'<div class="sline"><span>'+s.n+'</span><span class="sm">'+s.g+'</span></div>').join('')+'</div>';
}

function renderJournal(){
  const j = document.getElementById('journal');
  if(!day.length){
    j.innerHTML = '<div class="empty">Rien au journal pour l\'instant.<br>Ajoute ton premier aliment avec le bouton ＋.</div>';
    return;
  }
  j.innerHTML = day.map((e,i)=>{
    const r = e.g/100;
    return '<div class="entry" data-i="'+i+'">'+
     '<div class="et">'+(e.t||'')+'</div>'+
     '<div class="en"><div class="nn">'+e.n+'</div><div class="gg">'+e.g+' g</div></div>'+
     '<div class="ek">'+Math.round(e.u.k*r)+'<small>P '+Math.round(e.u.p*r)+'</small></div></div>';
  }).join('');
  j.querySelectorAll('.entry').forEach(el=> el.addEventListener('click', ()=>{
    const i = +el.dataset.i;
    openPortionForEntry(i);
  }));
}

function renderDateNav(){
  const d = new Date(viewDate+'T12:00:00');
  const isToday = viewDate===todayISO();
  const lbl = d.toLocaleDateString('fr-FR',{weekday:'short', day:'numeric', month:'short'});
  document.getElementById('dlabel').innerHTML = (isToday? "Aujourd'hui" : lbl)+'<small>'+(isToday? lbl : 'journal passé')+'</small>';
}
async function shiftDay(n){
  const d = new Date(viewDate+'T12:00:00'); d.setDate(d.getDate()+n);
  if(iso(d) > todayISO()) return;
  viewDate = iso(d);
  day = (await store.get('lt_day_'+viewDate)) || [];
  renderAll();
}
function renderAll(){ renderDateNav(); renderGauges(); renderJournal(); }

/* ================= PICKER ================= */
const pick = document.getElementById('pick'), pickin = document.getElementById('pickin');
function norm(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }

function openPicker(){
  pickCat='all'; pickSearch='';
  renderPicker();
  pick.classList.add('open'); pick.scrollTop=0;
}
function renderPicker(){
  let s = '<div class="ovhead"><button class="back" id="pkclose">✕</button><h2>Ajouter un aliment</h2></div>';
  s += '<input class="search" id="pksearch" type="search" placeholder="Rechercher…" value="'+pickSearch.replace(/"/g,'&quot;')+'">';
  s += '<div class="cats"><button class="cat'+(pickCat==='all'?' on':'')+'" data-c="all">Tous</button>'+
       CATS.map(c=>'<button class="cat'+(pickCat===c[0]?' on':'')+'" data-c="'+c[0]+'">'+c[1]+'</button>').join('')+'</div>';
  if(!pickSearch && pickCat==='all' && recents.length){
    const rf = recents.map(id=>foods.find(f=>f.id===id)).filter(Boolean).slice(0,8);
    if(rf.length) s += '<div class="seclab">Récents</div><div class="recents">'+
      rf.map(f=>'<button class="rc" data-id="'+f.id+'">'+f.n+'</button>').join('')+'</div>';
  }
  const q = norm(pickSearch);
  const list = foods.filter(f=> (pickCat==='all'||f.cat===pickCat) && (!q || norm(f.n).includes(q)) );
  s += '<div class="seclab">'+list.length+' aliment'+(list.length>1?'s':'')+' · valeurs pour 100 g</div>';
  s += list.map(f=>'<div class="frow" data-id="'+f.id+'"><div class="fn"><div class="nn">'+f.n+'</div>'+
     '<div class="mm">'+f.k+' kcal · P '+f.p+' · L '+f.f+' · G '+f.c+'</div></div>'+
     '<button class="fpen" data-pen="'+f.id+'">✎</button></div>').join('');
  s += '<button class="newfood" id="pknew">+ Créer un aliment</button>';
  pickin.innerHTML = s;

  document.getElementById('pkclose').onclick = ()=> pick.classList.remove('open');
  const si = document.getElementById('pksearch');
  si.addEventListener('input', ()=>{ pickSearch = si.value; renderPicker(); const s2=document.getElementById('pksearch'); s2.focus(); s2.setSelectionRange(s2.value.length,s2.value.length); });
  pickin.querySelectorAll('.cat').forEach(b=> b.onclick = ()=>{ pickCat=b.dataset.c; renderPicker(); });
  pickin.querySelectorAll('.frow').forEach(r=> r.addEventListener('click', (ev)=>{
    if(ev.target.closest('.fpen')) return;
    openPortion(r.dataset.id);
  }));
  pickin.querySelectorAll('.rc').forEach(b=> b.onclick = ()=> openPortion(b.dataset.id));
  pickin.querySelectorAll('.fpen').forEach(b=> b.onclick = ()=> openFoodEditor(b.dataset.pen));
  document.getElementById('pknew').onclick = ()=> openFoodEditor(null);
}

/* ================= PORTION ================= */
function livemHTML(f,g){
  const r=g/100;
  return '<div class="lm"><div class="v">'+Math.round(f.k*r)+'</div><div class="l">kcal</div></div>'+
   '<div class="lm P"><div class="v">'+(f.p*r).toFixed(1).replace('.0','')+'</div><div class="l">Prot.</div></div>'+
   '<div class="lm F"><div class="v">'+(f.f*r).toFixed(1).replace('.0','')+'</div><div class="l">Lip.</div></div>'+
   '<div class="lm C"><div class="v">'+(f.c*r).toFixed(1).replace('.0','')+'</div><div class="l">Gluc.</div></div>';
}
function portionView(f, g0, editIdx){
  let s = '<div class="ovhead"><button class="back" id="pback">‹</button><h2>'+(editIdx!=null?'Modifier':'Portion')+'</h2></div>';
  s += '<div class="pcard"><h3>'+f.n+'</h3>'+
   '<div class="per">'+f.k+' kcal · P '+f.p+' · L '+f.f+' · G '+f.c+' — pour 100 g</div>'+
   (f.hint? '<div class="hint">'+f.hint+'</div>':'')+
   '<div class="gramctl"><button class="gb" id="gminus">−</button><input type="number" inputmode="decimal" id="gin" value="'+g0+'"><button class="gb" id="gplus">＋</button></div>'+
   '<div class="gramu">grammes</div>'+
   '<div class="qchips">'+[30,50,100,150,200,250].map(q=>'<button class="qc" data-q="'+q+'">'+q+'</button>').join('')+'</div>'+
   '<div class="livem" id="livem">'+livemHTML(f,g0)+'</div>'+
   '<div class="pactions">'+(editIdx!=null? '<button class="pbtn del" id="pdel">Suppr.</button>':'')+
   '<button class="pbtn add" id="padd">'+(editIdx!=null? 'Enregistrer':'Ajouter au journal')+'</button></div></div>';
  pickin.innerHTML = s;
  pick.scrollTop = 0;

  const gin = document.getElementById('gin');
  const upd = ()=>{ const g = Math.max(0, parseFloat(gin.value)||0); document.getElementById('livem').innerHTML = livemHTML(f,g); };
  gin.addEventListener('input', upd);
  document.getElementById('gminus').onclick = ()=>{ gin.value = Math.max(0,(parseFloat(gin.value)||0)-10); upd(); };
  document.getElementById('gplus').onclick = ()=>{ gin.value = (parseFloat(gin.value)||0)+10; upd(); };
  pickin.querySelectorAll('.qc').forEach(b=> b.onclick = ()=>{ gin.value = b.dataset.q; upd(); });

  document.getElementById('pback').onclick = ()=>{ if(editIdx!=null){ pick.classList.remove('open'); } else renderPicker(); };
  document.getElementById('padd').onclick = async ()=>{
    const g = Math.max(1, Math.round(parseFloat(gin.value)||0));
    if(editIdx!=null){
      day[editIdx].g = g;
    }else{
      const now = new Date();
      day.push({n:f.n, g:g, t:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'), u:{k:f.k,p:f.p,f:f.f,c:f.c}, fid:f.id});
      recents = [f.id, ...recents.filter(x=>x!==f.id)].slice(0,10);
      await store.set('lt_recent', recents);
    }
    await saveDay();
    pick.classList.remove('open');
    renderAll();
  };
  const del = document.getElementById('pdel');
  if(del) del.onclick = async ()=>{
    day.splice(editIdx,1); await saveDay();
    pick.classList.remove('open'); renderAll();
  };
}
function openPortion(fid){
  const f = foods.find(x=>x.id===fid); if(!f) return;
  const last = [...day].reverse().find(e=>e.fid===fid);
  portionView(f, last? last.g : 100, null);
}
function openPortionForEntry(i){
  const e = day[i];
  const f = {id:e.fid, n:e.n, k:e.u.k, p:e.u.p, f:e.u.f, c:e.u.c, hint:(foods.find(x=>x.id===e.fid)||{}).hint};
  portionView(f, e.g, i);
  pick.classList.add('open'); pick.scrollTop=0;
}

/* ================= ÉDITEUR D'ALIMENT ================= */
function openFoodEditor(fid){
  const f = fid? foods.find(x=>x.id===fid) : {id:'f'+Date.now().toString(36), cat:'prot', n:'', k:'',p:'',f:'',c:'', hint:''};
  const isNew = !fid;
  let s = '<div class="ovhead"><button class="back" id="feback">‹</button><h2>'+(isNew?'Créer un aliment':'Modifier')+'</h2></div>';
  s += '<div class="fields">'+
   '<label>Nom<input type="text" id="fe-n" value="'+(f.n||'').replace(/"/g,'&quot;')+'"></label>'+
   '<label>Catégorie<select id="fe-cat">'+CATS.map(c=>'<option value="'+c[0]+'"'+(f.cat===c[0]?' selected':'')+'>'+c[1]+'</option>').join('')+'</select></label>'+
   '<div class="grid2">'+
    '<label>kcal / 100 g<input class="mono" type="number" inputmode="decimal" id="fe-k" value="'+f.k+'"></label>'+
    '<label>Protéines / 100 g<input class="mono" type="number" inputmode="decimal" id="fe-p" value="'+f.p+'"></label>'+
    '<label>Lipides / 100 g<input class="mono" type="number" inputmode="decimal" id="fe-f" value="'+f.f+'"></label>'+
    '<label>Glucides / 100 g<input class="mono" type="number" inputmode="decimal" id="fe-c" value="'+f.c+'"></label>'+
   '</div>'+
   '<label>Repère (optionnel)<input type="text" id="fe-h" value="'+(f.hint||'').replace(/"/g,'&quot;')+'" placeholder="ex. 1 boîte ≈ 112 g"></label>'+
  '</div>'+
  '<div class="savebar">'+(!isNew? '<button class="pbtn del" id="fe-del">Suppr.</button>':'')+
  '<button class="pbtn add" id="fe-ok">Enregistrer</button></div>';
  pickin.innerHTML = s; pick.scrollTop=0;

  document.getElementById('feback').onclick = ()=> renderPicker();
  document.getElementById('fe-ok').onclick = async ()=>{
    f.n = document.getElementById('fe-n').value.trim() || f.n || 'Aliment';
    f.cat = document.getElementById('fe-cat').value;
    f.k = parseFloat(document.getElementById('fe-k').value)||0;
    f.p = parseFloat(document.getElementById('fe-p').value)||0;
    f.f = parseFloat(document.getElementById('fe-f').value)||0;
    f.c = parseFloat(document.getElementById('fe-c').value)||0;
    f.hint = document.getElementById('fe-h').value.trim();
    if(isNew) foods.push(f);
    await saveFoods(); renderPicker();
  };
  const del = document.getElementById('fe-del');
  if(del) del.onclick = async ()=>{
    if(confirm('Supprimer « '+f.n+' » de la base ?')){
      foods = foods.filter(x=>x.id!==f.id);
      await saveFoods(); renderPicker();
    }
  };
}

/* ================= RÉGLAGES ================= */
const setov = document.getElementById('setov'), setin = document.getElementById('setin');
async function openSettings(){
  const w = (await store.get('lt_w')) || [];
  const last7 = w.slice(-7);
  const avg = last7.length? (last7.reduce((a,x)=>a+x.kg,0)/last7.length).toFixed(1) : null;
  let s = '<div class="ovhead"><button class="back" id="stclose">✕</button><h2>Cibles & suivi</h2></div>';
  s += '<div class="fields"><div class="grid2">'+
   '<label>Calories (kcal)<input class="mono" type="number" id="t-k" value="'+targets.k+'"></label>'+
   '<label>Protéines (g)<input class="mono" type="number" id="t-p" value="'+targets.p+'"></label>'+
   '<label>Lipides (g)<input class="mono" type="number" id="t-f" value="'+targets.f+'"></label>'+
   '<label>Glucides (g)<input class="mono" type="number" id="t-c" value="'+targets.c+'"></label>'+
  '</div></div>';
  s += '<div class="note">Réglé pour 72 kg : P = 0,9 g/lb (fourchette 127–159) · L ≈ 50 g en moyenne (45 les jours saumon-riz, 65 les jours curry/BBQ — ajuste à la journée si besoin) · G = le reste du budget. La vraie boussole : la <b>pesée du matin</b> — la moyenne 7 j doit descendre de ~0,3 kg/sem. Plus vite → +glucides. Plus lentement → −glucides.</div>';
  s += '<h2 style="font-family:\'Barlow Condensed\',sans-serif;font-size:22px;text-transform:uppercase;margin:22px 0 8px">Poids du matin</h2>';
  s += '<div class="fields"><label>Aujourd\'hui (kg)<input class="mono" type="number" inputmode="decimal" step="0.1" id="w-in" placeholder="72.0"></label></div>';
  s += '<button class="pbtn add" id="w-ok" style="margin-top:10px;width:100%">Enregistrer le poids</button>';
  if(avg) s += '<div class="avg">Moyenne 7 derniers relevés : <b>'+avg+' kg</b></div>';
  if(last7.length) s += '<div style="margin-top:8px">'+last7.slice().reverse().map(x=>'<div class="wrow"><span>'+x.d+'</span><span>'+x.kg.toFixed(1)+' kg</span></div>').join('')+'</div>';
  s += '<button class="pbtn add" id="t-ok" style="margin-top:22px;width:100%">Enregistrer les cibles</button>';
  s += '<button class="newfood" id="t-reset" style="margin-top:10px">Restaurer la base d\'aliments par défaut</button>';
  setin.innerHTML = s;
  setov.classList.add('open'); setov.scrollTop=0;

  document.getElementById('stclose').onclick = ()=> setov.classList.remove('open');
  document.getElementById('t-ok').onclick = async ()=>{
    targets = {
      k: parseInt(document.getElementById('t-k').value)||targets.k,
      p: parseInt(document.getElementById('t-p').value)||targets.p,
      f: parseInt(document.getElementById('t-f').value)||targets.f,
      c: parseInt(document.getElementById('t-c').value)||targets.c
    };
    await store.set('lt_targets', targets);
    setov.classList.remove('open'); renderAll();
  };
  document.getElementById('w-ok').onclick = async ()=>{
    const kg = parseFloat(document.getElementById('w-in').value);
    if(!kg || kg<30 || kg>250) return;
    const arr = (await store.get('lt_w')) || [];
    const t = todayISO();
    const i = arr.findIndex(x=>x.d===t);
    if(i>=0) arr[i].kg = kg; else arr.push({d:t, kg:kg});
    while(arr.length>60) arr.shift();
    await store.set('lt_w', arr);
    openSettings();
  };
  document.getElementById('t-reset').onclick = async ()=>{
    if(confirm("Restaurer la base d'aliments par défaut ? Tes aliments créés et tes modifications seront perdus (le journal, lui, est conservé).")){
      foods = JSON.parse(JSON.stringify(FOODS_DEFAULT));
      await saveFoods(); setov.classList.remove('open');
    }
  };
}

/* ================= INIT ================= */
document.getElementById('addbtn').onclick = openPicker;
document.getElementById('openSet').onclick = openSettings;
document.getElementById('dprev').onclick = ()=> shiftDay(-1);
document.getElementById('dnext').onclick = ()=> shiftDay(1);

(async function init(){
  await loadAll();
  renderAll();
})();
</script>
